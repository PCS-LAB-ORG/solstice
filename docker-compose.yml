services:
  solstice:
    build: .
    container_name: solstice
    ports:
      - "8200:8200"
    volumes:
      # Persist DB, CSVs, state between restarts
      - ./data:/app/data
      # ADC credentials for Google Drive refresh
      - ~/.config/gcloud:/root/.config/gcloud:ro
      # Google Drive Desktop — gives container access to .gsheet files
      - ~/Library/CloudStorage/GoogleDrive-mbanica@paloaltonetworks.com:/root/gdrive:ro
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    labels:
      - "com.docker.desktop.extension.name=Solstice"
      - "com.docker.desktop.extension.metadata.description=CC Migration Dashboard"
      - "traefik.http.routers.solstice.rule=PathPrefix(`/`)"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8200/ops"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
