<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>&#x2600;</text></svg>">
<title>Solstice — Blockers</title>

<link rel="stylesheet" href="/static/solstice.css">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
/* Summary bar */
.sumbar{display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:1.1rem;align-items:center}
.schip{display:inline-flex;align-items:center;gap:.3rem;font-size:9px;font-weight:600;padding:4px 10px;border-radius:4px;background:var(--surface);border:1px solid var(--border);color:var(--muted);cursor:pointer;transition:all .15s}
.schip:hover{border-color:var(--sky-border);color:var(--sky)}
.schip.act{border-color:var(--sky-border);color:var(--sky);background:var(--sky-light)}
.schip-total{font-size:9px;color:var(--muted);margin-left:.25rem}

@keyframes spin { to { transform: rotate(360deg); } }
/* Subtype sections */
.bsec{margin-bottom:1rem;border-radius:var(--radius);overflow:hidden;border:1px solid var(--border);background:var(--surface);box-shadow:var(--shadow-sm)}
.shdr{display:flex;align-items:center;gap:.65rem;padding:.6rem 1rem;background:var(--surface-2);cursor:pointer;user-select:none;border-bottom:1px solid var(--border);transition:background .15s}
.shdr:hover{background:#e8edf2}
.shdr.collapsed{border-bottom:none}
.shdr-icon{width:22px;height:22px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;font-family:var(--mono)}
.shdr-title{font-size:11px;font-weight:700;color:var(--text)}
.shdr-desc{font-size:9px;color:var(--muted);margin-left:.15rem}
.shdr-cnt{margin-left:auto;display:flex;align-items:center;gap:.5rem}
.chev{font-size:9px;color:var(--muted);transition:transform .2s}
.shdr:not(.collapsed) .chev{transform:rotate(0deg)}
.shdr.collapsed .chev{transform:rotate(-90deg)}
.sbody{background:var(--surface)}
.sbody.hidden{display:none}

/* Region sub-header inside section */
.reg-hdr{display:flex;align-items:center;gap:.5rem;padding:.3rem 1rem;background:var(--surface-2);border-bottom:1px solid var(--border-soft)}
.reg-hdr .reg-name{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--muted)}
.reg-hdr .reg-cnt{font-size:8px;color:var(--muted);font-family:var(--mono)}

/* Account rows */
.arow{display:grid;grid-template-columns:6px 2.2fr 1.4fr 1.1fr 2fr;align-items:stretch;border-bottom:1px solid var(--border-soft);cursor:pointer;transition:background .1s}
.arow:last-child{border-bottom:none}
.arow:hover{background:var(--surface-2)}
.arow.expanded{background:var(--sky-light)}
.ac{padding:.55rem .8rem;font-size:9.5px;border-right:1px solid var(--border-soft)}
.ac:first-child{padding:.55rem 0;display:flex;align-items:flex-start;justify-content:center;padding-top:.75rem;border-right:none}
.ac:last-child{border-right:none}
.sig-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-top:1px}
.aname{font-weight:700;font-size:10px;color:var(--text);margin-bottom:3px;line-height:1.3}
.asub{font-size:8px;color:var(--muted)}
.chip{display:inline-flex;align-items:center;gap:2px;background:var(--surface-2);border:1px solid var(--border);border-radius:3px;padding:2px 6px;font-size:8px;color:var(--muted);margin-bottom:2px}
.chip-role{font-size:7px;color:var(--muted);font-weight:700;font-family:var(--mono)}
.dc-dot{display:inline-block;width:7px;height:7px;border-radius:50%;vertical-align:middle;margin-right:2px;flex-shrink:0}
.notes-short{font-size:8.5px;color:var(--muted);line-height:1.45;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}

/* Inline expand panel */
.expand-panel{background:var(--sky-light);border-top:1px solid var(--sky-border);padding:.8rem 1.2rem;display:none}
.expand-panel.show{display:block}
.expand-grid{display:grid;grid-template-columns:1fr 1fr;gap:.6rem 1.5rem;font-size:9px;line-height:1.5}
.ef-label{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:2px}
.ef-val{color:var(--text-2);font-size:9px;line-height:1.45}
.ef-val.empty{color:var(--muted);font-style:italic}
.tags-row{display:flex;gap:.35rem;flex-wrap:wrap;margin-top:.5rem}

/* Milestone mini-bar */
.ms-pip{width:18px;height:4px;border-radius:2px}
.ms-lbl{font-size:7px;color:var(--muted);margin-top:2px;font-family:var(--mono)}

/* Empty state */
.empty-state{padding:2.5rem;text-align:center;color:var(--muted);font-size:10px}
.empty-state .empty-icon{font-size:24px;margin-bottom:.5rem}

/* Table col header */
.thdr{display:grid;grid-template-columns:6px 2.2fr 1.4fr 1.1fr 2fr;background:var(--surface-2);border-bottom:1px solid var(--border)}
.thdr span{padding:.3rem .8rem;font-size:7.5px;text-transform:uppercase;letter-spacing:.09em;color:var(--muted);font-weight:700;border-right:1px solid var(--border-soft)}
.thdr span:first-child{border-right:none}
.thdr span:last-child{border-right:none}
</style>
</head>
<body>
<nav id="s-nav" class="s-nav"></nav>
<div id="main" class="s-main">

  <!-- Filter bar -->
  <div style="display:flex;gap:.5rem;align-items:center;flex-wrap:wrap;margin-bottom:1rem">
    <span class="pill active" data-t="" onclick="setT(this,'')">All</span>
    <span class="pill" data-t="EMEA" onclick="setT(this,'EMEA')">EMEA</span>
    <span class="pill" data-t="AMER" onclick="setT(this,'AMER')">AMER</span>
    <span class="pill" data-t="JAPAC" onclick="setT(this,'JAPAC')">JAPAC</span>
    <span class="pill" data-t="LATAM" onclick="setT(this,'LATAM')">LATAM</span>
    <span style="color:var(--border);padding:0 .1rem;font-size:14px;align-self:center">|</span>
    <select id="f-region" onchange="load()" style="border:1px solid var(--border);border-radius:5px;color:var(--text);font-size:9px;padding:5px 8px;background:white;outline:none;cursor:pointer"><option value="">All Regions</option></select>
    <select id="f-cse" onchange="load()" style="border:1px solid var(--border);border-radius:5px;color:var(--text);font-size:9px;padding:5px 8px;background:white;outline:none;cursor:pointer"><option value="">All CSEs</option></select>
    <input id="f-search" placeholder="Search account or CSE..." oninput="render()" style="border:1px solid var(--border);border-radius:5px;color:var(--text);font-size:10px;padding:5px 10px;outline:none;min-width:180px;margin-left:auto">
  </div>

  <!-- Summary chips + jump-to anchors -->
  <div class="sumbar" id="sumbar"></div>

  <!-- Sections -->
  <div id="sections"></div>
</div>

<script src="/static/solstice.js?v=2"></script>
<script>
S.initNav('blockers');
S.restoreCard();

// ── State ───────────────────────────────────────────────────────────────────
var _theatre = '';
var _data = {};
var _m1Loading = false;
var _expandedRow = null;  // currently expanded row key

var TYPES = [
  {key:'m0_needed',        color:'#dc2626', bg:'rgba(220,38,38,.12)',   label:'M0 Not Started',    desc:'Kickoff never happened — upgrade cannot begin'},
  {key:'m0_no_m1',         color:'#f97316', bg:'rgba(249,115,22,.10)',  label:'M0 → M1 Stuck', desc:'Kickoff done but no action plan yet'},
  {key:'m1_plan',          color:'#0ea5e9', bg:'rgba(14,165,233,.08)',  label:'M1 Action Plan',    desc:'Accounts needing M1 outreach'},
  {key:'sla_breach',       color:'#ef4444', bg:'rgba(239,68,68,.08)',   label:'SLA Breach',        desc:'M3\u2192M8 >14d or M8\u2192M9 >28d'},
  {key:'churn',            color:'#dc2626', bg:'rgba(220,38,38,.10)',   label:'Churn Risk',        desc:'Customer decided not to upgrade or deal lost'},
  {key:'no_contact',       color:'#ef4444', bg:'rgba(239,68,68,.12)',   label:'No Contact',        desc:'Cannot reach customer — no response or refusing to meet'},
  {key:'customer_delay',   color:'#f97316', bg:'rgba(249,115,22,.10)',  label:'Customer Delay',    desc:'Customer pushing to delay — capacity, readiness or preference'},
  {key:'core_rep_blocking',color:'#f59e0b', bg:'rgba(245,158,11,.12)',  label:'Rep Blocking',      desc:'Account team asked CSE to hold'},
  {key:'tech_blocker',     color:'#8b5cf6', bg:'rgba(139,92,246,.12)',  label:'Technical Blocker', desc:'CoE / product gap / provisioning blocking progress'},
  {key:'active_deal',      color:'#3b82f6', bg:'rgba(59,130,246,.12)',  label:'Active Deal',       desc:'XSIAM or other deal in flight'},
  {key:'legal_blocker',    color:'#64748b', bg:'rgba(100,116,139,.10)', label:'Legal Blocker',     desc:'Legal reason blocking customer outreach or upgrade'},
  {key:'other',            color:'#94a3b8', bg:'rgba(148,163,184,.12)', label:'Other',             desc:'Uncategorised blockers'},
];

var SIG_COLORS = {green:'#10b981', blocked:'#ef4444', at_risk:'#f59e0b'};
var DC_COLORS  = {Green:'#10b981', Yellow:'#f59e0b', Red:'#ef4444'};
var E = S.esc;

// ── URL param helpers ───────────────────────────────────────────────────────
function _param(k) {
  return new URLSearchParams(window.location.search).get(k) || '';
}
function _pushUrl() {
  var p = new URLSearchParams();
  if (_theatre) p.set('theatre', _theatre);
  var region = document.getElementById('f-region').value;
  var cse    = document.getElementById('f-cse').value;
  if (region) p.set('region', region);
  if (cse)    p.set('cse', cse);
  var qs = p.toString();
  history.replaceState(null,'', window.location.pathname + (qs ? '?'+qs : ''));
}

// ── Theatre pill selection ──────────────────────────────────────────────────
function setT(el, t) {
  _theatre = t;
  document.querySelectorAll('.pill[data-t]').forEach(function(p) {
    p.classList.remove('active');
    if (p.dataset.t === t) p.classList.add('active');
  });
  load();
}

// ── Fetch + populate dropdowns ──────────────────────────────────────────────
function _showErr() { var el=document.getElementById('sections'); if(!el)return; el.textContent=''; var d=document.createElement('div'); d.className='empty-state'; d.textContent='Error loading data'; el.appendChild(d); }

function _normSla(sla) {
  var seen = {};
  return (sla||[]).filter(function(r){
    var key=(r.customer_name||'').toLowerCase().trim(); if(!key||seen[key])return false; seen[key]=1; return true;
  }).map(function(r) {
    return {
      account_id: r.account_id, customer_name: r.customer_name,
      active_cse: r.active_cse, sales_region: '', signal: 'blocked',
      status_detail: 'M3\u2192M8: '+(r.sla_m3_m8_days||'\u2014')+'d | M8\u2192M9: '+(r.sla_m8_m9_days||'\u2014')+'d',
      health_notes: (r.sla_m3_m8_breach?'M3\u2192M8 BREACH ':'')+(r.sla_m8_m9_breach?'M8\u2192M9 BREACH':''),
      dc_progress: r.dc_progress||'', subtype:'sla_breach',
    };
  });
}

function _normM1(m1cats) {
  var flat = []; var seen = {};
  (m1cats||[]).forEach(function(cat){
    if (cat.category !== 'actionable') return;
    (cat.accounts||[]).forEach(function(a){
      var key = (a.account_name||'').toLowerCase().trim();
      if (!key || seen[key]) return; seen[key] = 1;
      flat.push({
        account_id: a.account_id||'', customer_name: a.account_name||'',
        active_cse: a.assigned_cse||'', sales_region: a.region||'', signal: a.signal||'',
        status_detail: a.notes||a.status_detail||'', health_notes: '',
        dc_progress: a.dc_progress||'', subtype:'m1_plan',
      });
    });
  });
  return flat;
}

function load() {
  _pushUrl();
  var region = document.getElementById('f-region').value;
  var cse    = document.getElementById('f-cse').value;
  var url = '/api/blockers?theatre=' + encodeURIComponent(_theatre)
          + '&region=' + encodeURIComponent(region)
          + '&cse='    + encodeURIComponent(cse);

  // Load main blockers first — render immediately, then augment with SLA+M1
  fetch(url)
    .then(function(r) { return r.json(); })
    .then(function(d) {
      d.sla_breach = [];
      d.m1_plan = [];
      _data = d;
      _m1Loading = true;
      _rebuildDropdowns(d, cse);
      render();

      // Load M0 not started — kickoff never happened
      fetch('/api/m0-needed?theatre='+encodeURIComponent(_theatre))
        .then(function(r){return r.json();})
        .then(function(d){ _data.m0_needed=d; render(); })
        .catch(function(){});

      // Load M0→M1 stuck — kickoff done, no action plan
      fetch('/api/m0-no-m1?theatre='+encodeURIComponent(_theatre))
        .then(function(r){return r.json();})
        .then(function(d){ _data.m0_no_m1=d; render(); })
        .catch(function(){});

      // Load SLA async — update when ready
      fetch('/api/sla-breaches?theatre='+encodeURIComponent(_theatre))
        .then(function(r){return r.json();})
        .then(function(sla){ _data.sla_breach=_normSla(sla); render(); })
        .catch(function(){});

      // Load M1 async — may be slow due to LLM; show hourglass until done
      fetch('/api/m1-suggestions?theatre='+encodeURIComponent(_theatre))
        .then(function(r){return r.json();})
        .then(function(m1){ _m1Loading=false; _data.m1_plan=_normM1(m1); render(); })
        .catch(function(){ _m1Loading=false; });
    })
    .catch(_showErr);
}

function _rebuildDropdowns(d, currentCse) {
  var regions = {}, cses = {};
  TYPES.forEach(function(t) {
    (d[t.key] || []).forEach(function(a) {
      if (a.sales_region) regions[a.sales_region] = 1;
      if (a.active_cse)   cses[a.active_cse] = 1;
    });
  });
  var rEl = document.getElementById('f-region');
  var cEl = document.getElementById('f-cse');
  var curR = rEl.value;
  var curC = cEl.value;
  rEl.innerHTML = '<option value="">All Regions</option>';
  Object.keys(regions).sort().forEach(function(r) {
    var o = document.createElement('option');
    o.value = r; o.textContent = r;
    if (r === curR) o.selected = true;
    rEl.appendChild(o);
  });
  cEl.innerHTML = '<option value="">All CSEs</option>';
  Object.keys(cses).sort().forEach(function(c) {
    var o = document.createElement('option');
    o.value = c; o.textContent = c;
    if (c === curC) o.selected = true;
    cEl.appendChild(o);
  });
}

// ── Render all sections ─────────────────────────────────────────────────────
function render() {
  var q = (document.getElementById('f-search').value || '').toLowerCase();
  var filterRegion = (document.getElementById('f-region').value || '').toLowerCase();
  var filterCse    = (document.getElementById('f-cse').value || '').toLowerCase();
  var total = 0;
  var sumHtml  = '';
  var secHtml  = '';

  TYPES.forEach(function(type) {
    var items = (_data[type.key] || []).filter(function(a) {
      if (filterRegion && (a.sales_region || '').toLowerCase().indexOf(filterRegion) < 0) return false;
      if (filterCse    && (a.active_cse   || '').toLowerCase() !== filterCse) return false;
      return !q
        || (a.customer_name || '').toLowerCase().indexOf(q) >= 0
        || (a.active_cse    || '').toLowerCase().indexOf(q) >= 0
        || (a.sales_region  || '').toLowerCase().indexOf(q) >= 0;
    });
    var isM1Loading = (type.key === 'm1_plan' && _m1Loading);
    if (!items.length && !isM1Loading) return;
    total += items.length;

    // Summary chip
    sumHtml += '<span class="schip" id="chip-'+type.key+'" onclick="jumpTo(\''+type.key+'\')" title="'+E(type.desc)+'">'
      + '<span style="width:8px;height:8px;border-radius:50%;background:'+type.color+';flex-shrink:0;display:inline-block"></span>'
      + ' '+E(type.label)+': <b style="color:var(--text)">'+items.length+'</b>'
      + '</span>';

    // Group by region
    var byReg = {}; var regOrder = [];
    items.forEach(function(a) {
      var r = a.sales_region || 'Unknown';
      if (!byReg[r]) { byReg[r] = []; regOrder.push(r); }
      byReg[r].push(a);
    });

    // Rows HTML
    var rowsHtml = '<div class="thdr"><span></span><span>Account / CSE</span><span>Rep / DSM</span><span>DC · Risk</span><span>Notes</span></div>';
    regOrder.forEach(function(reg) {
      rowsHtml += '<div class="reg-hdr"><span class="reg-name">'+E(reg)+'</span><span class="reg-cnt">'+byReg[reg].length+'</span></div>';
      byReg[reg].forEach(function(a, i) {
        var rowKey = type.key + '_' + reg + '_' + i;
        rowsHtml += _accountRowHtml(a, rowKey, type);
      });
    });

    var iconHtml = isM1Loading
      ? '<div class="shdr-icon" style="background:'+type.bg+';color:'+type.color+';animation:spin 1.2s linear infinite">&#x231B;</div>'
      : '<div class="shdr-icon" style="background:'+type.bg+';color:'+type.color+'">'+items.length+'</div>';
    var aiHtml = isM1Loading
      ? '<span style="font-size:8px;color:var(--muted);font-style:italic">AI generating&#x2026;</span>'
      : _signalSummaryHtml(items);

    secHtml += '<div class="bsec" id="sec-'+type.key+'">'
      + '<div class="shdr collapsed" onclick="toggleSec(this,\'sec-'+type.key+'\')">'
        + iconHtml
        + '<span class="shdr-title">'+E(type.label)+'</span>'
        + '<span class="shdr-desc">— '+E(type.desc)+'</span>'
        + '<div class="shdr-cnt">'
          + aiHtml
          + '<span class="chev">&#9660;</span>'
        + '</div>'
      + '</div>'
      + '<div class="sbody hidden">'+rowsHtml+'</div>'
      + '</div>';
  });

  if (!total) {
    document.getElementById('sumbar').innerHTML = '';
    document.getElementById('sections').innerHTML = '<div class="empty-state"><div class="empty-icon">&#x2705;</div>No blocked accounts match current filters</div>';
    return;
  }

  sumHtml += '<span class="schip-total">'+total+' total</span>';
  document.getElementById('sumbar').innerHTML = sumHtml;
  document.getElementById('sections').innerHTML = secHtml;
}

var _EMPTY = ['tbd','tbd.','n/a','none','-','—',''];
function _usable(s){ return s && _EMPTY.indexOf(s.trim().toLowerCase())===-1 ? s.trim() : ''; }

// ── Single account row ──────────────────────────────────────────────────────
function _accountRowHtml(a, rowKey, type) {
  var sigColor = SIG_COLORS[a.signal] || '#94a3b8';
  var dcColor  = DC_COLORS[a.dc_progress] || '#94a3b8';
  var dc       = a.dc_progress || '—';

  var repHtml = (a.cc_rep && a.cc_rep !== '-')
    ? '<div class="chip"><span class="chip-role">REP</span> '+E(a.cc_rep)+'</div>' : '';
  var dsmHtml = (a.cc_dsm && a.cc_dsm !== '-')
    ? '<div class="chip"><span class="chip-role">DSM</span> '+E(a.cc_dsm)+'</div>'
    : '<div style="font-size:8px;color:var(--muted);padding:2px 0">No DSM</div>';

  var notesText = (_usable(a.upgrade_notes) || _usable(a.health_notes) || _usable(a.status_detail) || '—').substring(0, 180);

  var churnHtml = '';
  if (a.churn_risk && a.churn_risk !== '-') {
    var churnC = {Red:'#ef4444',Yellow:'#f59e0b',Green:'#10b981'}[a.churn_risk] || '#94a3b8';
    churnHtml = '<span style="font-size:8px;padding:1px 5px;border-radius:3px;background:'+churnC+'18;color:'+churnC+'">'+E(a.churn_risk)+'</span>';
  }

  return '<div class="arow" id="row-'+rowKey+'" onclick="toggleRow(\''+rowKey+'\')">'
    + '<div class="ac"><span class="sig-dot" style="background:'+sigColor+'"></span></div>'
    + '<div class="ac">'
      + '<div class="aname">'+E(a.customer_name || '—')+'</div>'
      + '<div class="asub">'+E(a.active_cse || '—')+' &middot; '+E(a.sales_region || '—')+'</div>'
    + '</div>'
    + '<div class="ac">'+repHtml+dsmHtml+'</div>'
    + '<div class="ac">'
      + '<div style="display:flex;align-items:center;gap:3px;margin-bottom:4px">'
        + '<span class="dc-dot" style="background:'+dcColor+'"></span>'
        + '<span style="font-size:8.5px;color:'+dcColor+'">'+E(dc)+'</span>'
      + '</div>'
      + churnHtml
    + '</div>'
    + '<div class="ac"><div class="notes-short">'+E(notesText)+'</div></div>'
    + '</div>'
    + '<div class="expand-panel" id="exp-'+rowKey+'">'
    + _expandPanelHtml(a)
    + '</div>';
}

// ── Expand panel content ────────────────────────────────────────────────────
function _expandPanelHtml(a) {
  var dcColor  = DC_COLORS[a.dc_progress] || '#94a3b8';

  // Milestone mini-bar: M3, M8, M9
  var msPips = [
    {lbl:'M3', done: a.m3_complete},
    {lbl:'M8', done: a.m8_started},
    {lbl:'M9', done: a.m9_complete}
  ].map(function(m) {
    var c = m.done ? '#10b981' : '#e2e8f0';
    return '<div style="display:flex;flex-direction:column;align-items:center;gap:2px">'
      + '<div class="ms-pip" style="background:'+c+'"></div>'
      + '<span class="ms-lbl">'+m.lbl+'</span>'
      + '</div>';
  }).join('<div style="width:8px;height:4px;display:flex;align-items:center;margin-bottom:10px"><div style="flex:1;height:1px;background:var(--border)"></div></div>');

  // Tags
  var tags = [];
  if (a.signal) tags.push('<span class="badge '+(a.signal==='blocked'?'badge-red':a.signal==='at_risk'?'badge-amber':'badge-green')+'">'+E(a.signal)+'</span>');
  if (a.m3_complete) tags.push('<span class="badge badge-green">M3 &#10003;</span>');
  if (a.m8_started)  tags.push('<span class="badge badge-green">M8 started</span>');
  if (a.cohort)      tags.push('<span class="badge badge-gray">'+E(a.cohort)+'</span>');

  var sdText  = a.status_detail  || '';
  var hnText  = a.health_notes   || '';
  var dcpText = a.dc_progress    || '—';
  var unText  = a.upgrade_notes  || '';

  // Last edited
  var leBy  = (a.last_edited_by  || '').replace(/@paloaltonetworks\.com/,'');
  var leDate= (a.last_edited_date|| '').split(' ')[0];
  var leHtml= (leBy||leDate) ? E(leBy||'—')+' &middot; '+E(leDate||'—') : '—';

  // Current project status
  var cpsText = a.current_project_status || '';

  // Milestone details
  function _mdet(label, val){
    if(!val || _EMPTY.indexOf((val||'').trim().toLowerCase())!==-1) return '';
    return '<div style="margin-top:4px"><span style="font-size:8px;color:var(--muted);font-family:var(--mono)">'+label+'</span> '
      +'<span style="font-size:8.5px">'+E(val)+'</span></div>';
  }
  var mdetHtml = _mdet('M1:',a.m1_details)+_mdet('M3:',a.m3_details)+_mdet('M5:',a.m5_details);

  return '<div class="expand-grid">'
    + '<div>'
      + '<div class="ef-label">Status Detail</div>'
      + '<div class="ef-val'+(sdText?'':' empty')+'">'+( sdText ? E(sdText) : 'Not set' )+'</div>'
    + '</div>'
    + '<div>'
      + '<div class="ef-label">DC Progress</div>'
      + '<div class="ef-val" style="color:'+(DC_COLORS[a.dc_progress]||'var(--muted)')+'">'+E(dcpText)+'</div>'
    + '</div>'
    + '<div>'
      + '<div class="ef-label">Health Notes</div>'
      + '<div class="ef-val'+(hnText?'':' empty')+'">'+( hnText ? E(hnText) : 'None' )+'</div>'
    + '</div>'
    + '<div>'
      + '<div class="ef-label">Upgrade Notes</div>'
      + '<div class="ef-val'+(unText?'':' empty')+'">'+( unText ? E(unText) : 'None' )+'</div>'
    + '</div>'
    + '<div>'
      + '<div class="ef-label">CC Rep / DSM</div>'
      + '<div class="ef-val">'+(a.cc_rep||'—')+' / '+(a.cc_dsm||'—')+'</div>'
    + '</div>'
    + '<div>'
      + '<div class="ef-label">Last Edited</div>'
      + '<div class="ef-val">'+leHtml+'</div>'
    + '</div>'
    + (cpsText ? '<div>'
      + '<div class="ef-label">Project Status</div>'
      + '<div class="ef-val">'+E(cpsText)+'</div>'
    + '</div>' : '')
    + '<div>'
      + '<div class="ef-label">Milestones</div>'
      + '<div style="display:flex;gap:4px;align-items:flex-end;margin-top:2px">'+msPips+'</div>'
      + mdetHtml
    + '</div>'
    + '</div>'
    + (tags.length ? '<div class="tags-row">'+tags.join('')+'</div>' : '');
}

// ── Signal summary mini-pills inside section header ─────────────────────────
function _signalSummaryHtml(items) {
  var blocked = 0, at_risk = 0;
  items.forEach(function(a) {
    if (a.signal === 'blocked') blocked++;
    else if (a.signal === 'at_risk') at_risk++;
  });
  var h = '';
  if (blocked) h += '<span class="badge badge-red" style="font-size:8px;padding:2px 6px">&#x1f6d1; '+blocked+'</span>';
  if (at_risk)  h += '<span class="badge badge-amber" style="font-size:8px;padding:2px 6px">&#x26a0; '+at_risk+'</span>';
  return h;
}

// ── Toggle collapsible section ──────────────────────────────────────────────
function toggleSec(hdr, secId) {
  hdr.classList.toggle('collapsed');
  document.querySelector('#'+secId+' .sbody').classList.toggle('hidden');
}

// ── Toggle inline expand ────────────────────────────────────────────────────
function toggleRow(rowKey) {
  var panel = document.getElementById('exp-' + rowKey);
  var row   = document.getElementById('row-' + rowKey);
  if (!panel) return;
  var isOpen = panel.classList.contains('show');
  // Close previous
  if (_expandedRow && _expandedRow !== rowKey) {
    var prev = document.getElementById('exp-' + _expandedRow);
    var prevRow = document.getElementById('row-' + _expandedRow);
    if (prev)    prev.classList.remove('show');
    if (prevRow) prevRow.classList.remove('expanded');
  }
  if (isOpen) {
    panel.classList.remove('show');
    row.classList.remove('expanded');
    _expandedRow = null;
  } else {
    panel.classList.add('show');
    row.classList.add('expanded');
    _expandedRow = rowKey;
  }
}

// ── Jump to section ─────────────────────────────────────────────────────────
function jumpTo(key) {
  var sec = document.getElementById('sec-' + key);
  if (sec) sec.scrollIntoView({behavior:'smooth', block:'start'});
}

// ── Init from URL params ─────────────────────────────────────────────────────
(function init() {
  var t = _param('theatre');
  var r = _param('region');
  var c = _param('cse');
  if (t) {
    _theatre = t;
    document.querySelectorAll('.pill[data-t]').forEach(function(p){
      p.classList.remove('active');
      if (p.dataset.t === t) p.classList.add('active');
    });
  }
  // region/cse will be set after dropdowns are built — store for after load
  window._initRegion = r;
  window._initCse    = c;
  load();
})();

// After first load, restore region/cse from URL
var _origRebuild = _rebuildDropdowns;
_rebuildDropdowns = function(d, currentCse) {
  _origRebuild(d, currentCse);
  if (window._initRegion) {
    document.getElementById('f-region').value = window._initRegion;
    window._initRegion = '';
  }
  if (window._initCse) {
    document.getElementById('f-cse').value = window._initCse;
    window._initCse = '';
  }
};
</script>
</body>
</html>
