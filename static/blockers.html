<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="icon" href="data:image/svg+xml,%3Csvg%20xmlns%3D%27http%3A//www.w3.org/2000/svg%27%20viewBox%3D%270%200%20100%20100%27%3E%3Ctext%20y%3D%27.9em%27%20font-size%3D%2790%27%3E%E2%98%80%3C/text%3E%3C/svg%3E">
<title>Solstice — Blockers</title>

<link rel="stylesheet" href="/static/solstice.css">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif}

/* Filter bar */
.fbar{display:flex;gap:.5rem;align-items:center;flex-wrap:wrap;padding:.65rem 0;margin-bottom:1rem;border-bottom:1px solid #1e2d40}
.tpill{font-size:8.5px;font-weight:700;letter-spacing:.07em;padding:4px 11px;border-radius:20px;cursor:pointer;border:1px solid #1e2d40;color:#475569;background:transparent;transition:all .15s;user-select:none}
.tpill:hover{border-color:#334155;color:#e2e8f0}
.tpill.act-all{border-color:#22d3ee;color:#22d3ee;background:rgba(34,211,238,.08)}
.tpill.act-emea{border-color:#22d3ee;color:#22d3ee;background:rgba(34,211,238,.08)}
.tpill.act-amer{border-color:#3b82f6;color:#3b82f6;background:rgba(59,130,246,.08)}
.tpill.act-japac{border-color:#8b5cf6;color:#8b5cf6;background:rgba(139,92,246,.08)}
.tpill.act-latam{border-color:#f59e0b;color:#f59e0b;background:rgba(245,158,11,.08)}
.fsep{color:#1e2d40;padding:0 .1rem;font-size:14px;align-self:center}
.fsel{background:#0f1729;border:1px solid #1e2d40;border-radius:5px;color:#475569;font-size:9px;padding:5px 8px;font-family:'JetBrains Mono',monospace;outline:none;cursor:pointer}
.fsel:focus{border-color:#334155;color:#e2e8f0}
.fsearch{background:#0f1729;border:1px solid #1e2d40;border-radius:5px;color:#e2e8f0;font-size:9px;padding:5px 10px;outline:none;min-width:180px;font-family:system-ui,sans-serif}
.fsearch:focus{border-color:#334155}
.fsearch::placeholder{color:#334155}

/* Summary bar */
.sumbar{display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:1.1rem;align-items:center}
.schip{display:inline-flex;align-items:center;gap:.3rem;font-size:9px;font-weight:600;padding:4px 10px;border-radius:4px;background:#0f1729;border:1px solid #1e2d40;color:#475569;cursor:pointer;transition:all .15s}
.schip:hover{border-color:#334155;color:#e2e8f0}
.schip.act{border-color:#22d3ee;color:#22d3ee;background:rgba(34,211,238,.08)}
.schip-total{font-size:9px;color:#334155;margin-left:.25rem}

/* Subtype sections */
.bsec{margin-bottom:1rem;border-radius:8px;overflow:hidden;border:1px solid #1e2d40}
.shdr{display:flex;align-items:center;gap:.65rem;padding:.6rem 1rem;background:#0f1729;cursor:pointer;user-select:none;border-bottom:1px solid #1e2d40;transition:background .15s}
.shdr:hover{background:#111827}
.shdr.collapsed{border-bottom:none}
.shdr-icon{width:22px;height:22px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;font-family:'JetBrains Mono',monospace}
.shdr-title{font-size:11px;font-weight:700;color:#e2e8f0}
.shdr-desc{font-size:9px;color:#475569;margin-left:.15rem}
.shdr-cnt{margin-left:auto;display:flex;align-items:center;gap:.5rem}
.cnt-badge{font-size:9px;font-weight:700;padding:2px 8px;border-radius:4px;font-family:'JetBrains Mono',monospace}
.chev{font-size:9px;color:#334155;transition:transform .2s}
.shdr:not(.collapsed) .chev{transform:rotate(0deg)}
.shdr.collapsed .chev{transform:rotate(-90deg)}
.sbody{background:#0a0e1a}
.sbody.hidden{display:none}

/* Region sub-header inside section */
.reg-hdr{display:flex;align-items:center;gap:.5rem;padding:.3rem 1rem;background:#0a0e1a;border-bottom:1px solid rgba(30,45,64,.6)}
.reg-hdr .reg-name{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#334155}
.reg-hdr .reg-cnt{font-size:8px;color:#1e2d40;font-family:'JetBrains Mono',monospace}

/* Account rows */
.arow{display:grid;grid-template-columns:6px 2.2fr 1.4fr 1.1fr 2fr;align-items:stretch;border-bottom:1px solid rgba(30,45,64,.5);cursor:pointer;transition:background .1s}
.arow:last-child{border-bottom:none}
.arow:hover{background:rgba(255,255,255,.018)}
.arow.expanded{background:rgba(34,211,238,.03)}
.ac{padding:.55rem .8rem;font-size:9.5px;border-right:1px solid rgba(30,45,64,.3)}
.ac:first-child{padding:.55rem 0;display:flex;align-items:flex-start;justify-content:center;padding-top:.75rem;border-right:none}
.ac:last-child{border-right:none}
.sig-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-top:1px}
.aname{font-weight:700;font-size:10px;color:#e2e8f0;margin-bottom:3px;line-height:1.3}
.asub{font-size:8px;color:#475569}
.chip{display:inline-flex;align-items:center;gap:2px;background:rgba(255,255,255,.04);border:1px solid #1e2d40;border-radius:3px;padding:2px 6px;font-size:8px;color:#475569;margin-bottom:2px}
.chip-role{font-size:7px;color:#334155;font-weight:700;font-family:'JetBrains Mono',monospace}
.dc-dot{display:inline-block;width:7px;height:7px;border-radius:50%;vertical-align:middle;margin-right:2px;flex-shrink:0}
.notes-short{font-size:8.5px;color:#475569;line-height:1.45;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}

/* Inline expand panel */
.expand-panel{background:rgba(34,211,238,.04);border-top:1px solid #1e2d40;padding:.8rem 1.2rem;display:none}
.expand-panel.show{display:block}
.expand-grid{display:grid;grid-template-columns:1fr 1fr;gap:.6rem 1.5rem;font-size:9px;line-height:1.5}
.ef-label{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#334155;margin-bottom:2px}
.ef-val{color:#94a3b8;font-size:9px;line-height:1.45}
.ef-val.empty{color:#334155;font-style:italic}
.tags-row{display:flex;gap:.35rem;flex-wrap:wrap;margin-top:.5rem}

/* Milestone mini-bar */
.ms-bar{display:flex;gap:2px;align-items:center;margin-top:.3rem}
.ms-pip{width:18px;height:4px;border-radius:2px}
.ms-lbl{font-size:7px;color:#334155;margin-top:2px;font-family:'JetBrains Mono',monospace}

/* Empty state */
.empty-state{padding:2.5rem;text-align:center;color:#334155;font-size:10px}
.empty-state .empty-icon{font-size:24px;margin-bottom:.5rem}

/* Table col header */
.thdr{display:grid;grid-template-columns:6px 2.2fr 1.4fr 1.1fr 2fr;background:#0f1729;border-bottom:1px solid #1e2d40}
.thdr span{padding:.3rem .8rem;font-size:7.5px;text-transform:uppercase;letter-spacing:.09em;color:#334155;font-weight:700;border-right:1px solid rgba(30,45,64,.3)}
.thdr span:first-child{border-right:none}
.thdr span:last-child{border-right:none}
</style>
</head>
<body style="background:#0a0e1a;color:#e2e8f0;min-height:100vh">
<nav id="s-nav" style="display:flex;align-items:center;padding:.6rem 1.5rem;background:#0f1729;border-bottom:1px solid #1e2d40;gap:12px;position:sticky;top:0;z-index:100"></nav>
<div id="main" style="max-width:1200px;margin:0 auto;padding:1.25rem 1.5rem">

  <!-- Filter bar -->
  <div class="fbar">
    <span class="tpill act-all" data-t="" onclick="setT(this,'')">All</span>
    <span class="tpill" data-t="EMEA" onclick="setT(this,'EMEA')">EMEA</span>
    <span class="tpill" data-t="AMER" onclick="setT(this,'AMER')">AMER</span>
    <span class="tpill" data-t="JAPAC" onclick="setT(this,'JAPAC')">JAPAC</span>
    <span class="tpill" data-t="LATAM" onclick="setT(this,'LATAM')">LATAM</span>
    <span class="fsep">|</span>
    <select class="fsel" id="f-region" onchange="load()"><option value="">All Regions</option></select>
    <select class="fsel" id="f-cse" onchange="load()"><option value="">All CSEs</option></select>
    <input class="fsearch" id="f-search" placeholder="Search account or CSE..." oninput="render()" style="margin-left:auto">
  </div>

  <!-- Summary chips + jump-to anchors -->
  <div class="sumbar" id="sumbar"></div>

  <!-- Sections -->
  <div id="sections"></div>
</div>

<script src="/static/solstice.js"></script>
<script>
S.initNav('blockers');
S.restoreCard();

// ── State ───────────────────────────────────────────────────────────────────
var _theatre = '';
var _data = {};
var _expandedRow = null;  // currently expanded row key

var TYPES = [
  {key:'no_contact',      color:'#ef4444', bg:'rgba(239,68,68,.12)',  label:'No Contact',           desc:'CSE cannot reach NGS Sales Specialist'},
  {key:'core_rep_blocking',color:'#f59e0b',bg:'rgba(245,158,11,.12)', label:'Rep Blocking',         desc:'Account team asked CSE to hold'},
  {key:'tech_blocker',    color:'#8b5cf6', bg:'rgba(139,92,246,.12)', label:'Technical Blocker',    desc:'CoE / product gap blocking progress'},
  {key:'active_deal',     color:'#3b82f6', bg:'rgba(59,130,246,.12)', label:'Active Deal',          desc:'XSIAM or other deal in flight'},
  {key:'other',           color:'#475569', bg:'rgba(71,85,105,.12)',  label:'Other',                desc:'Other blockers'},
];

var SIG_COLORS = {green:'#10b981', blocked:'#ef4444', at_risk:'#f59e0b'};
var DC_COLORS  = {Green:'#10b981', Yellow:'#f59e0b', Red:'#ef4444'};
var E = S.esc;

// ── URL param helpers ───────────────────────────────────────────────────────
function _param(k) {
  return new URLSearchParams(window.location.search).get(k) || '';
}
function _pushUrl() {
  var p = new URLSearchParams();
  if (_theatre) p.set('theatre', _theatre);
  var region = document.getElementById('f-region').value;
  var cse    = document.getElementById('f-cse').value;
  if (region) p.set('region', region);
  if (cse)    p.set('cse', cse);
  var qs = p.toString();
  history.replaceState(null,'', window.location.pathname + (qs ? '?'+qs : ''));
}

// ── Theatre pill selection ──────────────────────────────────────────────────
function setT(el, t) {
  _theatre = t;
  document.querySelectorAll('.tpill').forEach(function(p) {
    p.className = 'tpill';
    if (p.dataset.t === t) {
      var cls = {EMEA:'act-emea',AMER:'act-amer',JAPAC:'act-japac',LATAM:'act-latam','':'act-all'}[t] || 'act-all';
      p.className = 'tpill ' + cls;
    }
  });
  load();
}

// ── Fetch + populate dropdowns ──────────────────────────────────────────────
function load() {
  _pushUrl();
  var region = document.getElementById('f-region').value;
  var cse    = document.getElementById('f-cse').value;
  var url = '/api/blockers?theatre=' + encodeURIComponent(_theatre)
          + '&region=' + encodeURIComponent(region)
          + '&cse='    + encodeURIComponent(cse);
  fetch(url)
    .then(function(r) { return r.json(); })
    .then(function(d) {
      _data = d;
      _rebuildDropdowns(d, cse);
      render();
    })
    .catch(function() {
      document.getElementById('sections').innerHTML = '<div class="empty-state"><div class="empty-icon">&#x26a0;</div>Error loading data</div>';
    });
}

function _rebuildDropdowns(d, currentCse) {
  var regions = {}, cses = {};
  TYPES.forEach(function(t) {
    (d[t.key] || []).forEach(function(a) {
      if (a.sales_region) regions[a.sales_region] = 1;
      if (a.active_cse)   cses[a.active_cse] = 1;
    });
  });
  var rEl = document.getElementById('f-region');
  var cEl = document.getElementById('f-cse');
  var curR = rEl.value;
  var curC = cEl.value;
  rEl.innerHTML = '<option value="">All Regions</option>';
  Object.keys(regions).sort().forEach(function(r) {
    var o = document.createElement('option');
    o.value = r; o.textContent = r;
    if (r === curR) o.selected = true;
    rEl.appendChild(o);
  });
  cEl.innerHTML = '<option value="">All CSEs</option>';
  Object.keys(cses).sort().forEach(function(c) {
    var o = document.createElement('option');
    o.value = c; o.textContent = c;
    if (c === curC) o.selected = true;
    cEl.appendChild(o);
  });
}

// ── Render all sections ─────────────────────────────────────────────────────
function render() {
  var q = (document.getElementById('f-search').value || '').toLowerCase();
  var total = 0;
  var sumHtml  = '';
  var secHtml  = '';

  TYPES.forEach(function(type) {
    var items = (_data[type.key] || []).filter(function(a) {
      return !q
        || (a.customer_name || '').toLowerCase().indexOf(q) >= 0
        || (a.active_cse    || '').toLowerCase().indexOf(q) >= 0
        || (a.sales_region  || '').toLowerCase().indexOf(q) >= 0;
    });
    if (!items.length) return;
    total += items.length;

    // Summary chip
    sumHtml += '<span class="schip" id="chip-'+type.key+'" onclick="jumpTo(\''+type.key+'\')" title="'+E(type.desc)+'">'
      + '<span style="width:8px;height:8px;border-radius:50%;background:'+type.color+';flex-shrink:0;display:inline-block"></span>'
      + ' '+E(type.label)+': <b style="color:#e2e8f0">'+items.length+'</b>'
      + '</span>';

    // Group by region
    var byReg = {}; var regOrder = [];
    items.forEach(function(a) {
      var r = a.sales_region || 'Unknown';
      if (!byReg[r]) { byReg[r] = []; regOrder.push(r); }
      byReg[r].push(a);
    });

    // Rows HTML
    var rowsHtml = '<div class="thdr"><span></span><span>Account / CSE</span><span>Rep / DSM</span><span>DC · Risk</span><span>Notes</span></div>';
    regOrder.forEach(function(reg) {
      rowsHtml += '<div class="reg-hdr"><span class="reg-name">'+E(reg)+'</span><span class="reg-cnt">'+byReg[reg].length+'</span></div>';
      byReg[reg].forEach(function(a, i) {
        var rowKey = type.key + '_' + reg + '_' + i;
        rowsHtml += _accountRowHtml(a, rowKey, type);
      });
    });

    secHtml += '<div class="bsec" id="sec-'+type.key+'">'
      + '<div class="shdr" onclick="toggleSec(this,\'sec-'+type.key+'\')">'
        + '<div class="shdr-icon" style="background:'+type.bg+';color:'+type.color+'">'+items.length+'</div>'
        + '<span class="shdr-title">'+E(type.label)+'</span>'
        + '<span class="shdr-desc">— '+E(type.desc)+'</span>'
        + '<div class="shdr-cnt">'
          + _signalSummaryHtml(items)
          + '<span class="chev">&#9660;</span>'
        + '</div>'
      + '</div>'
      + '<div class="sbody">'+rowsHtml+'</div>'
      + '</div>';
  });

  if (!total) {
    document.getElementById('sumbar').innerHTML = '';
    document.getElementById('sections').innerHTML = '<div class="empty-state"><div class="empty-icon">&#x2705;</div>No blocked accounts match current filters</div>';
    return;
  }

  sumHtml += '<span class="schip-total">'+total+' total</span>';
  document.getElementById('sumbar').innerHTML = sumHtml;
  document.getElementById('sections').innerHTML = secHtml;
}

// ── Single account row ──────────────────────────────────────────────────────
function _accountRowHtml(a, rowKey, type) {
  var sigColor = SIG_COLORS[a.signal] || '#475569';
  var dcColor  = DC_COLORS[a.dc_progress] || '#475569';
  var dc       = a.dc_progress || '—';

  var repHtml = (a.cc_rep && a.cc_rep !== '-')
    ? '<div class="chip"><span class="chip-role">REP</span> '+E(a.cc_rep)+'</div>' : '';
  var dsmHtml = (a.cc_dsm && a.cc_dsm !== '-')
    ? '<div class="chip"><span class="chip-role">DSM</span> '+E(a.cc_dsm)+'</div>'
    : '<div style="font-size:8px;color:#334155;padding:2px 0">No DSM</div>';

  var notesText = (a.status_detail || a.upgrade_notes || a.health_notes || '—').substring(0, 180);

  var churnHtml = '';
  if (a.churn_risk && a.churn_risk !== '-') {
    var churnC = {Red:'#ef4444',Yellow:'#f59e0b',Green:'#10b981'}[a.churn_risk] || '#475569';
    churnHtml = '<span style="font-size:8px;padding:1px 5px;border-radius:3px;background:'+churnC+'18;color:'+churnC+'">'+E(a.churn_risk)+'</span>';
  }

  return '<div class="arow" id="row-'+rowKey+'" onclick="toggleRow(\''+rowKey+'\')">'
    + '<div class="ac"><span class="sig-dot" style="background:'+sigColor+'"></span></div>'
    + '<div class="ac">'
      + '<div class="aname">'+E(a.customer_name || '—')+'</div>'
      + '<div class="asub">'+E(a.active_cse || '—')+' &middot; '+E(a.sales_region || '—')+'</div>'
    + '</div>'
    + '<div class="ac">'+repHtml+dsmHtml+'</div>'
    + '<div class="ac">'
      + '<div style="display:flex;align-items:center;gap:3px;margin-bottom:4px">'
        + '<span class="dc-dot" style="background:'+dcColor+'"></span>'
        + '<span style="font-size:8.5px;color:'+dcColor+'">'+E(dc)+'</span>'
      + '</div>'
      + churnHtml
    + '</div>'
    + '<div class="ac"><div class="notes-short">'+E(notesText)+'</div></div>'
    + '</div>'
    + '<div class="expand-panel" id="exp-'+rowKey+'">'
    + _expandPanelHtml(a)
    + '</div>';
}

// ── Expand panel content ────────────────────────────────────────────────────
function _expandPanelHtml(a) {
  var sigColor = SIG_COLORS[a.signal] || '#475569';
  var dcColor  = DC_COLORS[a.dc_progress] || '#475569';

  // Milestone mini-bar: M3, M8, M9
  var msPips = [
    {lbl:'M3', done: a.m3_complete},
    {lbl:'M8', done: a.m8_started},
    {lbl:'M9', done: a.m9_complete}
  ].map(function(m) {
    var c = m.done ? '#10b981' : '#1e2d40';
    return '<div style="display:flex;flex-direction:column;align-items:center;gap:2px">'
      + '<div class="ms-pip" style="background:'+c+'"></div>'
      + '<span class="ms-lbl">'+m.lbl+'</span>'
      + '</div>';
  }).join('<div style="width:8px;height:4px;display:flex;align-items:center;margin-bottom:10px"><div style="flex:1;height:1px;background:#1e2d40"></div></div>');

  // Tags
  var tags = [];
  if (a.signal) tags.push('<span class="badge '+(a.signal==='blocked'?'badge-red':a.signal==='at_risk'?'badge-amber':'badge-green')+'">'+E(a.signal)+'</span>');
  if (a.m3_complete) tags.push('<span class="badge badge-green">M3 &#10003;</span>');
  if (a.m8_started)  tags.push('<span class="badge badge-green">M8 started</span>');
  if (a.cohort)      tags.push('<span style="font-size:8px;padding:2px 6px;border-radius:3px;background:#0f1729;border:1px solid #1e2d40;color:#475569">'+E(a.cohort)+'</span>');

  var sdText  = a.status_detail  || '';
  var hnText  = a.health_notes   || '';
  var dcpText = a.dc_progress    || '—';
  var unText  = a.upgrade_notes  || '';

  return '<div class="expand-grid">'
    + '<div>'
      + '<div class="ef-label">Status Detail</div>'
      + '<div class="ef-val'+(sdText?'':' empty')+'">'+( sdText ? E(sdText) : 'Not set' )+'</div>'
    + '</div>'
    + '<div>'
      + '<div class="ef-label">DC Progress</div>'
      + '<div class="ef-val" style="color:'+(DC_COLORS[a.dc_progress]||'#94a3b8')+'">'+E(dcpText)+'</div>'
    + '</div>'
    + '<div>'
      + '<div class="ef-label">Health Notes</div>'
      + '<div class="ef-val'+(hnText?'':' empty')+'">'+( hnText ? E(hnText) : 'None' )+'</div>'
    + '</div>'
    + '<div>'
      + '<div class="ef-label">Upgrade Notes</div>'
      + '<div class="ef-val'+(unText?'':' empty')+'">'+( unText ? E(unText) : 'None' )+'</div>'
    + '</div>'
    + '<div>'
      + '<div class="ef-label">CC Rep / DSM</div>'
      + '<div class="ef-val">'+(a.cc_rep||'—')+' / '+(a.cc_dsm||'—')+'</div>'
    + '</div>'
    + '<div>'
      + '<div class="ef-label">Milestones</div>'
      + '<div style="display:flex;gap:4px;align-items:flex-end;margin-top:2px">'+msPips+'</div>'
    + '</div>'
    + '</div>'
    + (tags.length ? '<div class="tags-row">'+tags.join('')+'</div>' : '');
}

// ── Signal summary mini-pills inside section header ─────────────────────────
function _signalSummaryHtml(items) {
  var blocked = 0, at_risk = 0;
  items.forEach(function(a) {
    if (a.signal === 'blocked') blocked++;
    else if (a.signal === 'at_risk') at_risk++;
  });
  var h = '';
  if (blocked) h += '<span class="badge badge-red" style="font-size:8px;padding:2px 6px">&#x1f6d1; '+blocked+'</span>';
  if (at_risk)  h += '<span class="badge badge-amber" style="font-size:8px;padding:2px 6px">&#x26a0; '+at_risk+'</span>';
  return h;
}

// ── Toggle collapsible section ──────────────────────────────────────────────
function toggleSec(hdr, secId) {
  hdr.classList.toggle('collapsed');
  document.querySelector('#'+secId+' .sbody').classList.toggle('hidden');
}

// ── Toggle inline expand ────────────────────────────────────────────────────
function toggleRow(rowKey) {
  var panel = document.getElementById('exp-' + rowKey);
  var row   = document.getElementById('row-' + rowKey);
  if (!panel) return;
  var isOpen = panel.classList.contains('show');
  // Close previous
  if (_expandedRow && _expandedRow !== rowKey) {
    var prev = document.getElementById('exp-' + _expandedRow);
    var prevRow = document.getElementById('row-' + _expandedRow);
    if (prev)    prev.classList.remove('show');
    if (prevRow) prevRow.classList.remove('expanded');
  }
  if (isOpen) {
    panel.classList.remove('show');
    row.classList.remove('expanded');
    _expandedRow = null;
  } else {
    panel.classList.add('show');
    row.classList.add('expanded');
    _expandedRow = rowKey;
  }
}

// ── Jump to section ─────────────────────────────────────────────────────────
function jumpTo(key) {
  var sec = document.getElementById('sec-' + key);
  if (sec) sec.scrollIntoView({behavior:'smooth', block:'start'});
}

// ── Init from URL params ─────────────────────────────────────────────────────
(function init() {
  var t = _param('theatre');
  var r = _param('region');
  var c = _param('cse');
  if (t) {
    _theatre = t;
    var pill = document.querySelector('.tpill[data-t="'+t+'"]');
    if (pill) {
      var cls = {EMEA:'act-emea',AMER:'act-amer',JAPAC:'act-japac',LATAM:'act-latam','':'act-all'}[t] || 'act-all';
      document.querySelectorAll('.tpill').forEach(function(p){ p.className='tpill'; });
      pill.className = 'tpill ' + cls;
    }
  }
  // region/cse will be set after dropdowns are built — store for after load
  window._initRegion = r;
  window._initCse    = c;
  load();
})();

// After first load, restore region/cse from URL
var _origRebuild = _rebuildDropdowns;
_rebuildDropdowns = function(d, currentCse) {
  _origRebuild(d, currentCse);
  if (window._initRegion) {
    document.getElementById('f-region').value = window._initRegion;
    window._initRegion = '';
  }
  if (window._initCse) {
    document.getElementById('f-cse').value = window._initCse;
    window._initCse = '';
  }
};
</script>
