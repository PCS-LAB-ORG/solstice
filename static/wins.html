<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Solstice - Wins</title>
<link rel="stylesheet" href="/static/solstice.css">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;margin-bottom:2rem}
.kpi{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1.5rem;text-align:center}
.kpi-num{font-size:2.8rem;font-weight:800;line-height:1.1;color:var(--sky)}
.kpi-lbl{font-size:.7rem;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);font-family:var(--mono);margin-top:.5rem}
.kpi-sub{font-size:.75rem;color:var(--text-2);margin-top:.25rem}
.wtbl{width:100%;border-collapse:collapse;background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-top:1.5rem}
.wtbl th{padding:.6rem 1.2rem;font-size:.7rem;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);font-family:var(--mono);font-weight:700;background:var(--surface-2);border-bottom:1px solid var(--border);text-align:left}
.wtbl th.r{text-align:right}
.wtbl td{padding:.8rem 1.2rem;font-size:.9rem;border-bottom:1px solid var(--border-soft);color:var(--text);vertical-align:middle}
.wtbl td.r{text-align:right;font-family:var(--mono)}
.wtbl tr.tot td{background:var(--surface-2);font-weight:700;border-top:1px solid var(--border);border-bottom:none}
.wtbl tr:not(.tot):hover td{background:var(--surface-2)}
.n9{font-size:1.2rem;font-weight:800;color:var(--sky)}
.n8{font-weight:600;color:var(--amber)}
.nb{font-weight:600;color:var(--green)}
.nm{color:var(--muted)}
.bar-w{display:flex;align-items:center;gap:.6rem}
.bar-bg{height:8px;background:var(--border);border-radius:4px;flex:1;min-width:60px;overflow:hidden}
.bar-f{height:100%;background:var(--sky);border-radius:4px}
.bar-t{font-size:.8rem;font-family:var(--mono);color:var(--muted);min-width:2.5rem;text-align:right}
.upd{font-size:.72rem;color:var(--muted);text-align:right;margin-top:.75rem}
</style>
</head>
<body>
<div id="s-nav"></div>
<div class="page-wrap" style="max-width:900px;margin:0 auto;padding:1.5rem 1.5rem 3rem">

  <div style="margin-bottom:1.75rem">
    <div style="font-size:1.5rem;font-weight:800;color:var(--text)">&#x1F3C6; Upgrade Wins</div>
    <div style="font-size:.85rem;color:var(--muted);margin-top:.3rem">All cohorts combined &middot; by theatre &middot; live</div>
  </div>

  <div class="kpi-row">
    <div class="kpi"><div class="kpi-num" id="k-m9">-</div><div class="kpi-lbl">Upgrade Complete</div><div class="kpi-sub">M9 done</div></div>
    <div class="kpi"><div class="kpi-num" id="k-m8">-</div><div class="kpi-lbl">M8 Active</div><div class="kpi-sub">Upgrade started</div></div>
    <div class="kpi"><div class="kpi-num" id="k-beat">-</div><div class="kpi-lbl">Beat Plan</div><div class="kpi-sub">Ahead of schedule</div></div>
    <div class="kpi"><div class="kpi-num" id="k-total">-</div><div class="kpi-lbl">Total Accounts</div><div class="kpi-sub">All cohorts</div></div>
  </div>

  <table class="wtbl">
    <thead><tr>
      <th>Theatre</th>
      <th class="r">Accounts</th>
      <th class="r">Upgrade Complete</th>
      <th class="r">M8 Active</th>
      <th class="r">Beat Plan</th>
      <th>Rate</th>
    </tr></thead>
    <tbody id="tbody"></tbody>
  </table>
  <div class="upd" id="upd"></div>

</div>
<script src="/static/solstice.js"></script>
<script>
S.initNav('wins');
var FLAGS={AMER:'&#x1F1FA;&#x1F1F8;',EMEA:'&#x1F30D;',JAPAC:'&#x1F30F;',LATAM:'&#x1F30E;'};

fetch('/api/wins').then(function(r){return r.json();}).then(function(d){
  var t=d.totals||{};
  document.getElementById('k-m9').textContent   = t.m9||0;
  document.getElementById('k-m8').textContent   = t.m8||0;
  document.getElementById('k-beat').textContent = t.beat_plan||0;
  document.getElementById('k-total').textContent= t.total||0;
  document.getElementById('upd').textContent    = 'Updated '+new Date().toLocaleString('en-GB',{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'});

  var regions=d.regions||[];
  var maxPct=regions.reduce(function(m,r){return r.total?Math.max(m,Math.round((r.m9||0)/r.total*100)):m;},0)||1;
  var tbody=document.getElementById('tbody');

  regions.forEach(function(r){
    var pct=r.total?Math.round((r.m9||0)/r.total*100):0;
    var star=r.region==='LATAM'&&r.m9>0?' &#x2605;':'';
    var tr=document.createElement('tr');
    tr.innerHTML='<td>'+(FLAGS[r.region]||'')+'&nbsp;<strong>'+(r.region||'?')+'</strong>'+star+'</td>'
      +'<td class="r nm">'+(r.total||0)+'</td>'
      +'<td class="r"><span class="n9">'+(r.m9||0)+'</span></td>'
      +'<td class="r"><span class="n8">'+(r.m8||0)+'</span></td>'
      +'<td class="r"><span class="nb">'+(r.beat_plan||0)+'</span></td>'
      +'<td><div class="bar-w"><div class="bar-bg"><div class="bar-f" style="width:'+Math.round(pct/maxPct*100)+'%"></div></div><span class="bar-t">'+pct+'%</span></div></td>';
    tbody.appendChild(tr);
  });

  var tr=document.createElement('tr');tr.className='tot';
  var tpct=t.total?Math.round((t.m9||0)/t.total*100):0;
  tr.innerHTML='<td>Total</td>'
    +'<td class="r">'+(t.total||0)+'</td>'
    +'<td class="r" style="color:var(--sky)">'+(t.m9||0)+'</td>'
    +'<td class="r" style="color:var(--amber)">'+(t.m8||0)+'</td>'
    +'<td class="r" style="color:var(--green)">'+(t.beat_plan||0)+'</td>'
    +'<td class="nm">'+tpct+'%</td>';
  tbody.appendChild(tr);
});
</script>
</body></html>
