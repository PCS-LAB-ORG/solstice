<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>&#x1F3C6;</text></svg>">
<title>Solstice — Wins</title>
<link rel="stylesheet" href="/static/solstice.css">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
.wins-hero{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;margin-bottom:2rem}
.hero-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1.5rem 2rem;text-align:center}
.hero-num{font-size:3rem;font-weight:800;line-height:1;color:var(--sky)}
.hero-lbl{font-size:.75rem;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);font-family:var(--mono);margin-top:.4rem}
.hero-sub{font-size:.8rem;color:var(--text-2);margin-top:.25rem}
.cohort-block{margin-bottom:2.5rem}
.cohort-title{font-size:.9rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--sky);font-family:var(--mono);margin-bottom:.75rem;display:flex;align-items:center;gap:.5rem}
.c-badge{font-size:.65rem;background:var(--surface-2);border:1px solid var(--border);border-radius:4px;padding:2px 7px;color:var(--muted);font-weight:600}
.wins-table{width:100%;border-collapse:collapse;background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden}
.wins-table th{padding:.5rem 1rem;font-size:.7rem;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);font-family:var(--mono);font-weight:700;background:var(--surface-2);border-bottom:1px solid var(--border);text-align:left}
.wins-table th.r{text-align:right}
.wins-table td{padding:.6rem 1rem;font-size:.85rem;border-bottom:1px solid var(--border-soft);color:var(--text);vertical-align:middle}
.wins-table td.r{text-align:right;font-family:var(--mono);font-weight:600}
.wins-table tr:last-child td{border-bottom:none}
.wins-table tr.tot td{background:var(--surface-2);font-weight:700;color:var(--sky)}
.wins-table tr:hover:not(.tot) td{background:var(--surface-2)}
.p9{display:inline-block;background:rgba(56,189,248,.12);color:var(--sky);font-weight:700;font-family:var(--mono);font-size:.85rem;padding:2px 10px;border-radius:20px}
.p8{display:inline-block;background:rgba(245,158,11,.08);color:var(--amber);font-weight:700;font-family:var(--mono);font-size:.85rem;padding:2px 10px;border-radius:20px}
.pb{display:inline-block;background:rgba(16,185,129,.1);color:var(--green);font-weight:700;font-family:var(--mono);font-size:.85rem;padding:2px 10px;border-radius:20px}
.zm{color:var(--muted);font-family:var(--mono)}
.rbar-w{display:flex;align-items:center;gap:.5rem}
.rbar{height:6px;background:var(--border);border-radius:3px;flex:1;overflow:hidden}
.rbar-f{height:100%;background:var(--sky);border-radius:3px}
.rbar-t{font-size:.75rem;font-family:var(--mono);color:var(--muted);min-width:3rem;text-align:right}
.sec-note{font-size:.78rem;color:var(--muted);margin-bottom:1.25rem;font-style:italic}
.divider{height:1px;background:var(--border);margin:2rem 0}
</style>
</head>
<body>
<div id="s-nav"></div>
<div class="page-wrap" style="max-width:900px;margin:0 auto;padding:1.5rem 1.5rem 3rem">

  <div style="margin-bottom:1.75rem">
    <div style="font-size:1.5rem;font-weight:800;color:var(--text)">&#x1F3C6; Upgrade Wins</div>
    <div style="font-size:.85rem;color:var(--muted);margin-top:.25rem">Scale cohort + PS cohorts &middot; Live milestone progress</div>
  </div>

  <div class="wins-hero">
    <div class="hero-card"><div class="hero-num" id="kpi-m9">—</div><div class="hero-lbl">M9 Complete</div><div class="hero-sub">Fully upgraded</div></div>
    <div class="hero-card"><div class="hero-num" id="kpi-m8">—</div><div class="hero-lbl">M8 Active</div><div class="hero-sub">Upgrade in progress</div></div>
    <div class="hero-card"><div class="hero-num" id="kpi-total">—</div><div class="hero-lbl">Total Accounts</div><div class="hero-sub">All cohorts</div></div>
  </div>

  <div class="cohort-block" id="blk-scale"></div>
  <div class="divider"></div>
  <div class="cohort-block" id="blk-mid"></div>
  <div class="divider"></div>
  <div class="cohort-block" id="blk-top"></div>

</div>
<script src="/static/solstice.js"></script>
<script>
S.initNav('wins');

var FLAGS = {AMER:'&#x1F1FA;&#x1F1F8;', EMEA:'&#x1F1EA;&#x1F1FA;', JAPAC:'&#x1F30F;', LATAM:'&#x1F30E;'};

function mkPill(v, cls) {
  if (!v) return '<span class="zm">—</span>';
  var el = document.createElement('span');
  el.className = cls;
  el.textContent = v;
  return el.outerHTML;
}

function mkBar(n, total) {
  if (!total) return '';
  var pct = Math.round((n||0) / total * 100);
  var wrap = document.createElement('div'); wrap.className = 'rbar-w';
  var bar  = document.createElement('div'); bar.className  = 'rbar';
  var fill = document.createElement('div'); fill.className = 'rbar-f'; fill.style.width = pct + '%';
  var txt  = document.createElement('span'); txt.className = 'rbar-t'; txt.textContent = pct + '%';
  bar.appendChild(fill); wrap.appendChild(bar); wrap.appendChild(txt);
  return wrap.outerHTML;
}

function buildTable(data, showBeat, showM7) {
  var rows = data.regions || [];
  var tot  = data.totals  || {};

  var tbl = document.createElement('table');
  tbl.className = 'wins-table';

  var thead = tbl.createTHead();
  var hr = thead.insertRow();
  ['Region','Accounts','M9 Complete','M8 Active'].forEach(function(h,i) {
    var th = document.createElement('th');
    th.textContent = h;
    if (i > 0) th.className = 'r';
    hr.appendChild(th);
  });
  if (showM7)   { var th = document.createElement('th'); th.className='r'; th.textContent='M7 Done';   hr.appendChild(th); }
  if (showBeat) { var th = document.createElement('th'); th.className='r'; th.textContent='Beat Plan'; hr.appendChild(th); }
  var th2 = document.createElement('th'); th2.textContent = 'M9 Rate'; hr.appendChild(th2);

  var tbody = tbl.createTBody();

  rows.forEach(function(r) {
    var tr = tbody.insertRow();
    var star = (r.region === 'LATAM' && r.m9 > 0) ? ' &#x2605;' : '';
    var regionCell = tr.insertCell(); regionCell.innerHTML = (FLAGS[r.region]||'&#x1F310;') + ' <strong>' + (r.region||'?') + '</strong>' + star;
    var totCell = tr.insertCell(); totCell.className='r'; totCell.textContent = r.total||0;
    var m9Cell  = tr.insertCell(); m9Cell.className='r';  m9Cell.innerHTML = mkPill(r.m9, 'p9');
    var m8Cell  = tr.insertCell(); m8Cell.className='r';  m8Cell.innerHTML = mkPill(r.m8, 'p8');
    if (showM7)   { var c = tr.insertCell(); c.className='r zm'; c.textContent = r.m7||0; }
    if (showBeat) { var c = tr.insertCell(); c.className='r'; c.innerHTML = mkPill(r.beat_plan,'pb'); }
    var barCell = tr.insertCell(); barCell.style.minWidth='130px'; barCell.innerHTML = mkBar(r.m9, r.total);
  });

  // total row
  var tr = tbody.insertRow(); tr.className = 'tot';
  var tc0 = tr.insertCell(); tc0.textContent = 'Total';
  var tc1 = tr.insertCell(); tc1.className='r'; tc1.textContent = tot.total||0;
  var tc2 = tr.insertCell(); tc2.className='r'; tc2.innerHTML = mkPill(tot.m9,'p9');
  var tc3 = tr.insertCell(); tc3.className='r'; tc3.innerHTML = mkPill(tot.m8,'p8');
  if (showM7)   { var c = tr.insertCell(); c.className='r'; c.textContent = tot.m7||0; }
  if (showBeat) { var c = tr.insertCell(); c.className='r'; c.innerHTML = mkPill(tot.beat_plan,'pb'); }
  var tc4 = tr.insertCell(); tc4.innerHTML = mkBar(tot.m9, tot.total);

  return tbl;
}

function buildBlock(id, emoji, title, badge, note, data, showBeat, showM7) {
  var el = document.getElementById(id);
  if (!el) return;
  el.textContent = '';

  var hdr = document.createElement('div'); hdr.className = 'cohort-title';
  hdr.textContent = emoji + ' ' + title + ' ';
  var b = document.createElement('span'); b.className = 'c-badge'; b.textContent = badge;
  hdr.appendChild(b); el.appendChild(hdr);

  if (note) { var nd = document.createElement('div'); nd.className = 'sec-note'; nd.textContent = note; el.appendChild(nd); }

  el.appendChild(buildTable(data, showBeat, showM7));
}

fetch('/api/wins').then(function(r){ return r.json(); }).then(function(d) {
  var g = d['_grand'] || {};
  document.getElementById('kpi-m9').textContent    = g.m9    || 0;
  document.getElementById('kpi-m8').textContent    = g.m8    || 0;
  document.getElementById('kpi-total').textContent = g.total || 0;

  var sc = d['Scale']      || {};
  var pm = d['PS 101-650'] || {};
  var pt = d['PS Top 100'] || {};

  buildBlock('blk-scale', 'Scale', 'Scale Cohort',
    (sc.totals && sc.totals.total ? sc.totals.total : '?') + ' accounts',
    'First-ever self-service scale motion. M9 = fully upgraded without PS engagement.',
    sc, true, false);

  buildBlock('blk-mid', 'PS', 'PS Cohort — 101–650',
    (pm.totals && pm.totals.total ? pm.totals.total : '?') + ' accounts',
    'Mid-market strategic accounts with dedicated PS delivery.',
    pm, true, false);

  buildBlock('blk-top', '⭐', 'PS Cohort — Top 100',
    (pt.totals && pt.totals.total ? pt.totals.total : '?') + ' accounts',
    'Largest strategic accounts. All in flight. M8 active = upgrade underway.',
    pt, false, true);
});
</script>
</body></html>
