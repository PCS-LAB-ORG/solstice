<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Solstice &#x2014; Wins</title>
<link rel="stylesheet" href="/static/solstice.css">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;margin-bottom:2rem}
.kpi{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1.5rem;text-align:center}
.kpi-num{font-size:2.8rem;font-weight:800;line-height:1;color:var(--sky)}
.kpi-lbl{font-size:.7rem;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);font-family:var(--mono);margin-top:.4rem}
.kpi-sub{font-size:.75rem;color:var(--text-2);margin-top:.2rem}
.wtbl{width:100%;border-collapse:collapse;background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-top:1.5rem}
.wtbl th{padding:.6rem 1.2rem;font-size:.7rem;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);font-family:var(--mono);font-weight:700;background:var(--surface-2);border-bottom:1px solid var(--border);text-align:left}
.wtbl th.r{text-align:right}
.wtbl td{padding:.75rem 1.2rem;font-size:.9rem;border-bottom:1px solid var(--border-soft);color:var(--text);vertical-align:middle}
.wtbl td.r{text-align:right;font-family:var(--mono);font-weight:600}
.wtbl tr:last-child td{border-bottom:none}
.wtbl tr.tot td{background:var(--surface-2);font-weight:700;border-top:1px solid var(--border)}
.wtbl tr:hover:not(.tot) td{background:var(--surface-2)}
.pill9{display:inline-block;background:rgba(56,189,248,.15);color:var(--sky);font-weight:700;font-family:var(--mono);font-size:.9rem;padding:3px 14px;border-radius:20px;min-width:40px;text-align:center}
.pill8{display:inline-block;background:rgba(245,158,11,.1);color:var(--amber);font-weight:700;font-family:var(--mono);font-size:.9rem;padding:3px 14px;border-radius:20px;min-width:40px;text-align:center}
.pillb{display:inline-block;background:rgba(16,185,129,.12);color:var(--green);font-weight:700;font-family:var(--mono);font-size:.9rem;padding:3px 14px;border-radius:20px;min-width:40px;text-align:center}
.mute{color:var(--muted);font-family:var(--mono)}
.rbar-w{display:flex;align-items:center;gap:.6rem}
.rbar{height:7px;background:var(--border);border-radius:4px;flex:1;overflow:hidden;min-width:80px}
.rbar-f{height:100%;background:var(--sky);border-radius:4px}
.rbar-t{font-size:.8rem;font-family:var(--mono);color:var(--muted);min-width:2.8rem;text-align:right}
</style>
</head>
<body>
<div id="s-nav"></div>
<div class="page-wrap" style="max-width:860px;margin:0 auto;padding:1.5rem 1.5rem 3rem">

  <div style="margin-bottom:1.75rem">
    <div style="font-size:1.5rem;font-weight:800;color:var(--text)">&#x1F3C6; Upgrade Wins</div>
    <div style="font-size:.85rem;color:var(--muted);margin-top:.3rem">All cohorts combined &middot; breakdown by theatre &middot; live data</div>
  </div>

  <div class="kpi-row">
    <div class="kpi"><div class="kpi-num" id="k-m9">&#x2014;</div><div class="kpi-lbl">M9 Complete</div><div class="kpi-sub">Fully upgraded</div></div>
    <div class="kpi"><div class="kpi-num" id="k-m8">&#x2014;</div><div class="kpi-lbl">M8 Active</div><div class="kpi-sub">Upgrade in progress</div></div>
    <div class="kpi"><div class="kpi-num" id="k-beat">&#x2014;</div><div class="kpi-lbl">Beat Plan</div><div class="kpi-sub">Finished ahead of date</div></div>
    <div class="kpi"><div class="kpi-num" id="k-total">&#x2014;</div><div class="kpi-lbl">Total Accounts</div><div class="kpi-sub">All cohorts</div></div>
  </div>

  <table class="wtbl" id="wtbl">
    <thead><tr>
      <th>Theatre</th>
      <th class="r">Accounts</th>
      <th class="r">M9 Complete</th>
      <th class="r">M8 Active</th>
      <th class="r">Beat Plan</th>
      <th>M9 Rate</th>
    </tr></thead>
    <tbody id="wtbl-body"></tbody>
  </table>

</div>
<script src="/static/solstice.js"></script>
<script>
S.initNav('wins');

var FLAGS = {AMER:'&#x1F1FA;&#x1F1F8;',EMEA:'&#x1F1EA;&#x1F1FA;',JAPAC:'&#x1F30F;',LATAM:'&#x1F30E;'};

function pill(val, cls) {
  var sp = document.createElement('span');
  if (!val) { sp.className='mute'; sp.textContent='0'; return sp; }
  sp.className = cls; sp.textContent = val; return sp;
}

function bar(n, total) {
  if (!total) return document.createTextNode('');
  var pct = Math.round((n||0)/total*100);
  var w = document.createElement('div'); w.className='rbar-w';
  var b = document.createElement('div'); b.className='rbar';
  var f = document.createElement('div'); f.className='rbar-f'; f.style.width=pct+'%';
  var t = document.createElement('span'); t.className='rbar-t'; t.textContent=pct+'%';
  b.appendChild(f); w.appendChild(b); w.appendChild(t);
  return w;
}

function addRow(tbody, r, isTot) {
  var tr = tbody.insertRow();
  if (isTot) tr.className='tot';

  // Theatre
  var td0 = tr.insertCell();
  if (isTot) {
    td0.textContent = 'Total';
  } else {
    var star = (r.region==='LATAM' && r.m9>0) ? ' ★' : '';
    td0.innerHTML = (FLAGS[r.region]||'&#x1F310;') + ' ';
    var b2 = document.createElement('strong'); b2.textContent = (r.region||'?') + star;
    td0.appendChild(b2);
  }

  // Accounts
  var td1 = tr.insertCell(); td1.className='r mute'; td1.textContent = r.total||0;

  // M9
  var td2 = tr.insertCell(); td2.className='r'; td2.appendChild(pill(r.m9,'pill9'));

  // M8
  var td3 = tr.insertCell(); td3.className='r'; td3.appendChild(pill(r.m8,'pill8'));

  // Beat plan
  var td4 = tr.insertCell(); td4.className='r'; td4.appendChild(pill(r.beat_plan,'pillb'));

  // Rate bar
  var td5 = tr.insertCell(); td5.style.minWidth='140px'; td5.appendChild(bar(r.m9, r.total));
}

fetch('/api/wins').then(function(r){return r.json();}).then(function(d){
  var tot = d.totals || {};
  document.getElementById('k-m9').textContent    = tot.m9    || 0;
  document.getElementById('k-m8').textContent    = tot.m8    || 0;
  document.getElementById('k-beat').textContent  = tot.beat_plan || 0;
  document.getElementById('k-total').textContent = tot.total  || 0;

  var tbody = document.getElementById('wtbl-body');
  (d.regions||[]).forEach(function(r){ addRow(tbody, r, false); });
  addRow(tbody, tot, true);
});
</script>
</body></html>
