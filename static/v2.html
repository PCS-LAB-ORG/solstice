<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>&#x2600;</text></svg>">
<title>Solstice — Ops</title>

<link rel="stylesheet" href="/static/solstice.css">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
<nav id="s-nav" class="s-nav"></nav>

<div id="main" class="s-main">

  <!-- Theatre filter pills + Refresh -->
  <div style="display:flex;align-items:center;gap:.5rem;margin-bottom:1.5rem;flex-wrap:wrap">
    <div id="theatre-pills" style="display:flex;gap:.5rem;flex-wrap:wrap;flex:1"></div>
    <span id="last-sync" class="mono text-muted" style="font-size:9px"></span>
    <button onclick="refreshData()" class="pill" style="border-color:var(--sky-border);color:var(--sky);background:var(--sky-light)">&#10227; Refresh Data</button>
  </div>

  <!-- KPI row -->
  <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;margin-bottom:1.5rem">
    <div class="kpi-card sky">
      <div class="kpi-label">M9 COMPLETE</div>
      <div class="kpi-number" id="kpi-m9-val">—</div>
      <div class="kpi-delta delta-neu" style="font-size:10px">Upgrades done</div>
    </div>
    <div class="kpi-card amber">
      <div class="kpi-label">AT RISK</div>
      <div class="kpi-number" id="kpi-risk-val">—</div>
      <div class="kpi-delta delta-neu" style="font-size:10px">Signal at_risk, not done</div>
    </div>
    <div class="kpi-card red">
      <div class="kpi-label">BLOCKED</div>
      <div class="kpi-number" id="kpi-blocked-val">—</div>
      <div class="kpi-delta delta-neu" style="font-size:10px">Signal blocked, not done</div>
    </div>
  </div>

  <!-- Milestone funnel -->
  <div class="card" style="margin-bottom:1.5rem">
    <div class="card-head"><span class="card-title">MILESTONE FUNNEL</span></div>
    <div class="card-body"><div id="funnel-bars"></div></div>
  </div>

  <!-- SLA Breaches -->
  <div class="card" style="margin-bottom:1.5rem">
    <div class="card-head">
      <div style="display:flex;align-items:center;gap:.75rem">
        <span class="card-title">SLA BREACHES</span>
        <span class="badge badge-red mono" id="sla-count">—</span>
      </div>
      <a href="/blockers" class="text-link">→ Blockers for full call prep</a>
    </div>
    <div style="overflow-x:auto"><table id="sla-table" class="s-table">
      <thead><tr>
        <th>Account</th>
        <th>CSE</th>
        <th style="text-align:right">M3→M8 days</th>
        <th style="text-align:right">M8→M9 days</th>
        <th>DC Progress</th>
      </tr></thead>
      <tbody id="sla-list"></tbody>
    </table></div>
  </div>

  <!-- M1 Action Plan -->
  <div class="card" style="margin-bottom:1.5rem">
    <div class="card-head">
      <div style="display:flex;align-items:center;gap:.5rem">
        <span class="card-title">M1 ACTION PLAN</span>
        <span class="badge badge-sky">AI-assisted</span>
        <span class="badge badge-gray mono" id="m1-count"></span>
      </div>
    </div>
    <div id="m1-list"></div>
  </div>

</div>

<!-- SSE pipeline console -->
<div id="pipeline-console" style="display:none;position:fixed;bottom:0;left:0;right:0;background:var(--surface-2);border-top:2px solid var(--sky);max-height:200px;overflow-y:auto;padding:12px 1.5rem;font-family:'JetBrains Mono',monospace;font-size:10px;z-index:100"></div>

<script src="/static/solstice.js"></script>
<script>
S.initNav('ops');
S.restoreCard();

var _theatre = (new URLSearchParams(location.search).get('theatre') || '');
var _msRows = [];

// ── HTML escape ────────────────────────────────────────────────────
function E(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ── Theatre pills ─────────────────────────────────────────────────
function initTheatre() {
  fetch('/api/theatres').then(function(r){return r.json();}).then(function(rows) {
    var container = document.getElementById('theatre-pills');
    var all = [{theatre:'',label:'All Theatres'}].concat(rows.map(function(r){return {theatre:r.theatre,label:r.theatre};}));
    container.innerHTML = all.map(function(item) {
      var act = item.theatre === _theatre;
      return '<button onclick="setTheatre(\'' + E(item.theatre) + '\')" class="pill' + (act ? ' active' : '') + '">'
        + E(item.label) + '</button>';
    }).join('');
  }).catch(function(){});
}

function setTheatre(t) {
  _theatre = t;
  var url = new URL(location.href);
  if (t) { url.searchParams.set('theatre', t); } else { url.searchParams.delete('theatre'); }
  history.replaceState(null, '', url.toString());
  initTheatre();
  loadAll();
}

// ── Milestones + KPIs + Funnel ────────────────────────────────────
function loadMilestones() {
  fetch('/api/milestones?theatre=' + encodeURIComponent(_theatre))
    .then(function(r){return r.json();})
    .then(function(rows) {
      _msRows = rows;
      renderKPIs(rows);
      renderFunnel(rows);
    }).catch(console.error);
}

function renderKPIs(rows) {
  var m9 = rows.filter(function(r){return r.m9_complete;}).length;
  var risk = rows.filter(function(r){return r.signal==='at_risk' && !r.m9_complete;}).length;
  var blocked = rows.filter(function(r){return r.signal==='blocked' && !r.m9_complete;}).length;
  document.getElementById('kpi-m9-val').textContent = m9;
  document.getElementById('kpi-risk-val').textContent = risk;
  document.getElementById('kpi-blocked-val').textContent = blocked;
}

function renderFunnel(rows) {
  var tot = rows.length || 1;
  var steps = [
    {key:'m1_complete', label:'M1 Outreach'},
    {key:'m3_complete', label:'M3 Buy-in'},
    {key:'m8_started',  label:'M8 Started'},
    {key:'m9_complete', label:'M9 Done'},
  ];
  var counts = {};
  steps.forEach(function(s) { counts[s.key] = rows.filter(function(r){return r[s.key];}).length; });
  var maxW = 100;
  var container = document.getElementById('funnel-bars');
  var barColors = {m1_complete:'#0ea5e9', m3_complete:'#0ea5e9', m8_started:'#f59e0b', m9_complete:'#10b981'};
  container.innerHTML = steps.map(function(s) {
    var n = counts[s.key] || 0;
    var pct = Math.round(n / tot * 100);
    var col = barColors[s.key] || '#0ea5e9';
    return '<div class="funnel-row">'
      + '<div class="funnel-label">' + E(s.label) + '</div>'
      + '<div class="funnel-track">'
      + '<div class="funnel-bar" style="background:' + col + ';width:' + pct + '%;transition:width .4s"></div>'
      + '</div>'
      + '<div class="funnel-count">' + n + '</div>'
      + '<div class="funnel-pct">' + pct + '%</div>'
      + '</div>';
  }).join('');
}

// ── SLA breaches ──────────────────────────────────────────────────
function loadSLA() {
  fetch('/api/sla-breaches?theatre=' + encodeURIComponent(_theatre))
    .then(function(r){return r.json();})
    .then(function(rows) {
      document.getElementById('sla-count').textContent = rows.length;
      var tbody = document.getElementById('sla-list');
      if (!rows.length) {
        tbody.innerHTML = '<tr><td colspan="5" class="text-muted" style="padding:.75rem 1rem;text-align:center">No SLA violations</td></tr>';
        return;
      }
      var DC_BADGE = {Green:'badge-green', Yellow:'badge-amber', Red:'badge-red'};
      tbody.innerHTML = rows.map(function(r) {
        var d38 = r.sla_m3_m8_days != null ? r.sla_m3_m8_days+'d' : '—';
        var d89 = r.sla_m8_m9_days != null ? r.sla_m8_m9_days+'d' : '—';
        var cls38 = r.sla_m3_m8_breach ? 'badge badge-red mono' : 'mono text-muted';
        var cls89 = r.sla_m8_m9_breach ? 'badge badge-amber mono' : 'mono text-muted';
        var dcBadge = DC_BADGE[r.dc_progress] || 'badge-gray';
        var aid = r.account_id || '';
        return '<tr onclick="' + (aid ? 'S.openAccountCard(\'' + E(aid) + '\')' : '') + '" '
          + 'style="cursor:' + (aid?'pointer':'default') + '" '
          + 'onmouseover="this.style.background=\'var(--surface-2)\'" onmouseout="this.style.background=\'\'">'
          + '<td class="fw-600">' + E(r.customer_name) + '</td>'
          + '<td class="text-muted">' + E(r.active_cse||'—') + '</td>'
          + '<td style="text-align:right"><span class="' + cls38 + '">' + d38 + '</span></td>'
          + '<td style="text-align:right"><span class="' + cls89 + '">' + d89 + '</span></td>'
          + '<td><span class="badge ' + dcBadge + '">' + E(r.dc_progress||'—') + '</span></td>'
          + '</tr>';
      }).join('');
    }).catch(console.error);
}

// ── M1 action plan ────────────────────────────────────────────────
function loadM1() {
  var spin=document.getElementById('m1-list');
  spin.textContent='';
  var ic=document.createElement('div');
  ic.style.cssText='padding:1rem;text-align:center;font-size:18px;color:var(--muted)';
  ic.textContent='\u231b';
  spin.appendChild(ic);
  fetch('/api/m1-suggestions?theatre=' + encodeURIComponent(_theatre))
    .then(function(r){return r.json();})
    .then(function(data) {
      var tot = data.reduce(function(s,c){return s + (c.total||0);}, 0);
      document.getElementById('m1-count').textContent = tot;
      var container = document.getElementById('m1-list');
      // Flatten all accounts across categories, top 10
      var all = [];
      data.forEach(function(cat) { (cat.accounts||[]).forEach(function(a){ all.push(a); }); });
      var top10 = all.slice(0, 10);
      if (!top10.length) {
        container.innerHTML = '<div class="text-muted" style="padding:.75rem 1rem;font-size:10px">No M1 suggestions</div>';
        return;
      }
      var sigBadge = {green:'badge-green', at_risk:'badge-amber', blocked:'badge-red'};
      var sigDot = {green:'#10b981', at_risk:'#f59e0b', blocked:'#ef4444'};
      container.innerHTML = top10.map(function(r) {
        var dotCol = sigDot[r.signal] || '#94a3b8';
        var aid = r.account_id ? 'S.openAccountCard(\'' + E(r.account_id) + '\')' : '';
        return '<div ' + (aid ? 'onclick="' + aid + '"' : '') + ' '
          + 'style="padding:.5rem 1rem;border-bottom:1px solid var(--border);cursor:pointer;display:flex;align-items:center;gap:.6rem" '
          + 'onmouseover="this.style.background=\'var(--surface-2)\'" onmouseout="this.style.background=\'\'">'
          + '<span style="width:6px;height:6px;border-radius:50%;background:' + dotCol + ';flex-shrink:0"></span>'
          + '<div style="flex:1;min-width:0">'
          + '<div class="fw-600" style="font-size:10px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">' + E(r.account_name||r.customer_name) + '</div>'
          + '<div class="text-muted" style="font-size:8.5px;margin-top:1px">' + E(r.assigned_cse||'—') + (r.region ? ' \u00b7 ' + E(r.region) : '') + '</div>'
          + '</div>'
          + (r.churn_risk ? '<span class="badge badge-amber" style="font-size:8px;padding:1px 5px;flex-shrink:0">' + E(r.churn_risk) + '</span>' : '')
          + '</div>';
      }).join('');
    }).catch(function(e){ console.error('M1 error',e); document.getElementById('m1-list').textContent='Error loading'; });
}

// ── CSE workload ─────────────────────────────────────────────────
function loadCSE() {
  fetch('/api/cse-workload?theatre=' + encodeURIComponent(_theatre))
    .then(function(r){return r.json();})
    .then(function(rows) {
      var top5 = (rows||[]).slice(0, 5);
      var maxBlocked = top5.reduce(function(m,r){return Math.max(m, r.blocked||0);}, 1);
      var container = document.getElementById('cse-bars');
      if (!top5.length) {
        container.innerHTML = '<div class="text-muted" style="font-size:10px">No data</div>';
        return;
      }
      container.innerHTML = top5.map(function(r) {
        var pct = Math.round((r.blocked||0) / maxBlocked * 100);
        return '<div style="display:flex;align-items:center;gap:.75rem">'
          + '<div class="fw-600 mono" style="font-size:10px;width:100px;flex-shrink:0">' + E(r.cse||r.active_cse||'—') + '</div>'
          + '<div style="flex:1;background:var(--surface-2);border-radius:4px;height:10px">'
          + '<div style="background:var(--sky);height:100%;border-radius:4px;width:' + pct + '%"></div>'
          + '</div>'
          + '<div class="text-muted mono" style="font-size:10px;width:50px;text-align:right">'
          + (r.blocked||0) + ' blocked</div>'
          + '</div>';
      }).join('');
    }).catch(function() {
      // Fallback: try /api/cse
      fetch('/api/cse').then(function(r){return r.json();}).then(function(rows) {
        var top5 = (rows||[]).slice(0, 5);
        var maxT = top5.reduce(function(m,r){return Math.max(m, r.total||0);}, 1);
        var container = document.getElementById('cse-bars');
        container.innerHTML = top5.map(function(r) {
          var pct = Math.round((r.total||0) / maxT * 100);
          return '<div style="display:flex;align-items:center;gap:.75rem">'
            + '<div class="fw-600 mono" style="font-size:10px;width:100px;flex-shrink:0">' + E(r.active_cse||'—') + '</div>'
            + '<div style="flex:1;background:var(--surface-2);border-radius:4px;height:10px">'
            + '<div style="background:var(--sky);height:100%;border-radius:4px;width:' + pct + '%"></div>'
            + '</div>'
            + '<div class="text-muted mono" style="font-size:10px;width:60px;text-align:right">'
            + (r.total||0) + ' total</div>'
            + '</div>';
        }).join('');
      }).catch(function(){
        document.getElementById('cse-bars').innerHTML = '<div class="text-muted" style="font-size:10px">No data</div>';
      });
    });
}

// ── Refresh pipeline ──────────────────────────────────────────────
function refreshData() {
  var console_el = document.getElementById('pipeline-console');
  console_el.style.display = 'block';
  console_el.innerHTML = '<div style="color:#94a3b8;margin-bottom:4px">&#9654; Starting pipeline...</div>';
  var es = new EventSource('/api/run-full');
  es.onmessage = function(e) {
    try {
      var d = JSON.parse(e.data);
      var line = document.createElement('div');
      var colorMap = {green:'#10b981', red:'#ef4444', amber:'#f59e0b', teal:'#0ea5e9', muted:'#94a3b8'};
      line.style.color = colorMap[d.color] || '#e2e8f0';
      line.textContent = '[' + (d.step||'') + '] ' + (d.detail||d.status||'');
      console_el.appendChild(line);
      console_el.scrollTop = console_el.scrollHeight;
      if (d.status === 'done' || d.done) {
        es.close();
        loadAll();
        S.syncSummary({m9:0, blocked:0, resolved:0});
        setTimeout(function(){console_el.style.display='none';}, 5000);
      }
    } catch(ex) {}
  };
  es.onerror = function() { es.close(); };
}

// ── Load all ──────────────────────────────────────────────────────
function loadAll() {
  loadMilestones();
  loadSLA();
  fetch('/api/stats').then(function(r){return r.json();}).then(function(s){
    var el=document.getElementById('last-sync');
    if(el && s.last_run) el.textContent='synced '+s.last_run;
  }).catch(function(){});
}

initTheatre();
loadAll();
setInterval(loadAll, 60000);
</script>
</body>
</html>
