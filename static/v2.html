<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>&#x2600;</text></svg>">
<title>Solstice — Ops</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="/static/solstice.css">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
</head>
<body style="background:#0a0e1a;color:#e2e8f0;min-height:100vh">
<nav id="s-nav" style="display:flex;align-items:center;padding:.6rem 1.5rem;background:#0f1729;border-bottom:1px solid #1e2d40;gap:12px"></nav>

<div id="main" style="max-width:1200px;margin:0 auto;padding:1.5rem">

  <!-- Theatre filter pills -->
  <div id="theatre-pills" style="display:flex;gap:.5rem;margin-bottom:1.5rem;flex-wrap:wrap"></div>

  <!-- KPI row -->
  <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;margin-bottom:1.5rem">
    <div id="kpi-m9" style="background:#0f1729;border:1px solid #1e2d40;border-radius:8px;padding:1.25rem" class="glow-cyan">
      <div style="font-size:9px;color:#475569;letter-spacing:2px;text-transform:uppercase;margin-bottom:.5rem">M9 COMPLETE</div>
      <div class="kpi-number" id="kpi-m9-val">—</div>
      <div style="font-size:10px;color:#475569;margin-top:.4rem">Upgrades done</div>
    </div>
    <div id="kpi-risk" style="background:#0f1729;border:1px solid #1e2d40;border-radius:8px;padding:1.25rem">
      <div style="font-size:9px;color:#475569;letter-spacing:2px;text-transform:uppercase;margin-bottom:.5rem">AT RISK</div>
      <div class="kpi-number" id="kpi-risk-val" style="color:#f59e0b">—</div>
      <div style="font-size:10px;color:#475569;margin-top:.4rem">Signal at_risk, not done</div>
    </div>
    <div id="kpi-blocked" style="background:#0f1729;border:1px solid #1e2d40;border-radius:8px;padding:1.25rem">
      <div style="font-size:9px;color:#475569;letter-spacing:2px;text-transform:uppercase;margin-bottom:.5rem">BLOCKED</div>
      <div class="kpi-number" id="kpi-blocked-val" style="color:#ef4444">—</div>
      <div style="font-size:10px;color:#475569;margin-top:.4rem">Signal blocked, not done</div>
    </div>
  </div>

  <!-- Milestone funnel -->
  <div style="background:#0f1729;border:1px solid #1e2d40;border-radius:8px;padding:1.25rem;margin-bottom:1.5rem">
    <div style="font-size:9px;color:#475569;letter-spacing:2px;text-transform:uppercase;margin-bottom:1rem">MILESTONE FUNNEL</div>
    <div id="funnel-bars" style="display:flex;flex-direction:column;gap:.6rem"></div>
  </div>

  <!-- Two-column layout: SLA + M1 -->
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1.5rem">

    <!-- SLA breach list -->
    <div style="background:#0f1729;border:1px solid #1e2d40;border-radius:8px;overflow:hidden">
      <div style="padding:.8rem 1rem;border-bottom:1px solid #1e2d40;display:flex;align-items:center;justify-content:space-between">
        <span style="font-size:9px;color:#475569;letter-spacing:2px;text-transform:uppercase">SLA BREACHES</span>
        <span id="sla-count" style="font-size:10px;color:#ef4444;font-family:'JetBrains Mono',monospace">—</span>
      </div>
      <div id="sla-list" style="padding:.5rem 0;max-height:360px;overflow-y:auto"></div>
    </div>

    <!-- M1 Action plan -->
    <div style="background:#0f1729;border:1px solid #1e2d40;border-radius:8px;overflow:hidden">
      <div style="padding:.8rem 1rem;border-bottom:1px solid #1e2d40;display:flex;align-items:center;justify-content:space-between">
        <span style="font-size:9px;color:#475569;letter-spacing:2px;text-transform:uppercase">M1 ACTION PLAN</span>
        <span id="m1-count" style="font-size:10px;color:#22d3ee;font-family:'JetBrains Mono',monospace">—</span>
      </div>
      <div id="m1-list" style="padding:.5rem 0;max-height:360px;overflow-y:auto"></div>
    </div>

  </div>

  <!-- CSE Workload -->
  <div style="background:#0f1729;border:1px solid #1e2d40;border-radius:8px;margin-bottom:1.5rem;overflow:hidden">
    <div style="padding:.8rem 1rem;border-bottom:1px solid #1e2d40">
      <span style="font-size:9px;color:#475569;letter-spacing:2px;text-transform:uppercase">CSE WORKLOAD</span>
    </div>
    <div id="cse-bars" style="padding:1rem;display:flex;flex-direction:column;gap:.5rem"></div>
  </div>

  <!-- Refresh button -->
  <div style="display:flex;justify-content:flex-end;margin-bottom:1rem">
    <button onclick="refreshData()" style="background:#0f1729;border:1px solid #22d3ee;color:#22d3ee;padding:6px 16px;border-radius:4px;cursor:pointer;font-size:11px;font-family:'JetBrains Mono',monospace">&#10227; Refresh Data</button>
  </div>

</div>

<!-- SSE pipeline console -->
<div id="pipeline-console" style="display:none;position:fixed;bottom:0;left:0;right:0;background:#0f1729;border-top:2px solid #22d3ee;max-height:200px;overflow-y:auto;padding:12px 1.5rem;font-family:'JetBrains Mono',monospace;font-size:10px;z-index:100"></div>

<script src="/static/solstice.js"></script>
<script>
S.initNav('ops');
S.restoreCard();

var _theatre = (new URLSearchParams(location.search).get('theatre') || '');
var _msRows = [];

// ── HTML escape ────────────────────────────────────────────────────
function E(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ── Theatre pills ─────────────────────────────────────────────────
function initTheatre() {
  fetch('/api/theatres').then(function(r){return r.json();}).then(function(rows) {
    var container = document.getElementById('theatre-pills');
    var all = [{theatre:'',label:'All Theatres'}].concat(rows.map(function(r){return {theatre:r.theatre,label:r.theatre};}));
    container.innerHTML = all.map(function(item) {
      var act = item.theatre === _theatre;
      return '<button onclick="setTheatre(\'' + E(item.theatre) + '\')" '
        + 'style="font-size:10px;padding:4px 14px;border-radius:20px;cursor:pointer;border:1px solid '
        + (act ? '#22d3ee' : '#1e2d40') + ';color:' + (act ? '#22d3ee' : '#475569')
        + ';background:' + (act ? 'rgba(34,211,238,.08)' : 'transparent') + ';font-family:\'JetBrains Mono\',monospace">'
        + E(item.label) + '</button>';
    }).join('');
  }).catch(function(){});
}

function setTheatre(t) {
  _theatre = t;
  var url = new URL(location.href);
  if (t) { url.searchParams.set('theatre', t); } else { url.searchParams.delete('theatre'); }
  history.replaceState(null, '', url.toString());
  initTheatre();
  loadAll();
}

// ── Milestones + KPIs + Funnel ────────────────────────────────────
function loadMilestones() {
  fetch('/api/milestones?theatre=' + encodeURIComponent(_theatre))
    .then(function(r){return r.json();})
    .then(function(rows) {
      _msRows = rows;
      renderKPIs(rows);
      renderFunnel(rows);
    }).catch(console.error);
}

function renderKPIs(rows) {
  var m9 = rows.filter(function(r){return r.m9_complete;}).length;
  var risk = rows.filter(function(r){return r.signal==='at_risk' && !r.m9_complete;}).length;
  var blocked = rows.filter(function(r){return r.signal==='blocked' && !r.m9_complete;}).length;
  document.getElementById('kpi-m9-val').textContent = m9;
  document.getElementById('kpi-risk-val').textContent = risk;
  document.getElementById('kpi-blocked-val').textContent = blocked;
}

function renderFunnel(rows) {
  var tot = rows.length || 1;
  var steps = [
    {key:'m3_complete', label:'M3 Buy-in'},
    {key:'m8_started',  label:'M8 Started'},
    {key:'m9_complete', label:'M9 Done'},
  ];
  var counts = {};
  steps.forEach(function(s) { counts[s.key] = rows.filter(function(r){return r[s.key];}).length; });
  var maxW = 100;
  var container = document.getElementById('funnel-bars');
  container.innerHTML = steps.map(function(s, i) {
    var n = counts[s.key] || 0;
    var pct = Math.round(n / tot * 100);
    var w = Math.max(2, Math.round(n / tot * maxW));
    var col = i === 2 ? '#10b981' : '#22d3ee';
    return '<div style="display:flex;align-items:center;gap:.75rem">'
      + '<div style="font-size:9px;color:#475569;font-family:\'JetBrains Mono\',monospace;width:80px;flex-shrink:0">' + E(s.label) + '</div>'
      + '<div style="flex:1;background:#1e2d40;border-radius:4px;height:14px;position:relative">'
      + '<div style="background:' + col + ';height:100%;border-radius:4px;width:' + pct + '%;transition:width .4s"></div>'
      + '</div>'
      + '<div style="font-family:\'JetBrains Mono\',monospace;font-size:11px;font-weight:700;color:' + col + ';width:40px;text-align:right">' + n + '</div>'
      + '<div style="font-size:9px;color:#475569;width:32px;text-align:right">' + pct + '%</div>'
      + '</div>';
  }).join('');
}

// ── SLA breaches ──────────────────────────────────────────────────
function loadSLA() {
  fetch('/api/sla-breaches')
    .then(function(r){return r.json();})
    .then(function(rows) {
      document.getElementById('sla-count').textContent = rows.length;
      var container = document.getElementById('sla-list');
      if (!rows.length) {
        container.innerHTML = '<div style="padding:.75rem 1rem;font-size:10px;color:#475569">No SLA violations</div>';
        return;
      }
      var top10 = rows.slice(0, 10);
      container.innerHTML = top10.map(function(r) {
        var b38 = r.sla_m3_m8_breach, b89 = r.sla_m8_m9_breach;
        var badges = '';
        if (b38) badges += '<span class="badge badge-red" style="font-size:8px;padding:1px 5px">M3&#8594;M8</span> ';
        if (b89) badges += '<span class="badge badge-amber" style="font-size:8px;padding:1px 5px">M8&#8594;M9</span>';
        var slaHtml = S.slaCountdownHTML(r.m3_actual||r.m3_planned, r.m3_planned, r.m8_actual||r.m8_planned, r.m9_planned, r.m9_actual);
        return '<div onclick="S.openAccountCard(\'' + E(r.account_id) + '\')" '
          + 'style="padding:.5rem 1rem;border-bottom:1px solid #1e2d40;cursor:pointer;display:flex;align-items:flex-start;justify-content:space-between;gap:.5rem" '
          + 'onmouseover="this.style.background=\'rgba(255,255,255,.02)\'" onmouseout="this.style.background=\'\'">'
          + '<div style="min-width:0">'
          + '<div style="font-size:10px;font-weight:700;color:#e2e8f0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">' + E(r.customer_name) + '</div>'
          + '<div style="font-size:8.5px;color:#475569;margin-top:2px">' + E(r.active_cse||'—') + '</div>'
          + '</div>'
          + '<div style="display:flex;flex-direction:column;align-items:flex-end;gap:3px;flex-shrink:0">'
          + badges + (slaHtml ? '<div style="margin-top:2px">' + slaHtml + '</div>' : '')
          + '</div>'
          + '</div>';
      }).join('');
    }).catch(console.error);
}

// ── M1 action plan ────────────────────────────────────────────────
function loadM1() {
  fetch('/api/m1-suggestions?theatre=' + encodeURIComponent(_theatre))
    .then(function(r){return r.json();})
    .then(function(data) {
      var tot = data.reduce(function(s,c){return s + (c.total||0);}, 0);
      document.getElementById('m1-count').textContent = tot;
      var container = document.getElementById('m1-list');
      // Flatten all accounts across categories, top 10
      var all = [];
      data.forEach(function(cat) { (cat.accounts||[]).forEach(function(a){ all.push(a); }); });
      var top10 = all.slice(0, 10);
      if (!top10.length) {
        container.innerHTML = '<div style="padding:.75rem 1rem;font-size:10px;color:#475569">No M1 suggestions</div>';
        return;
      }
      var sigC = {green:'#10b981', at_risk:'#f59e0b', blocked:'#ef4444'};
      container.innerHTML = top10.map(function(r) {
        var sc = sigC[r.signal] || '#475569';
        return '<div onclick="S.openAccountCard(\'' + E(r.account_id) + '\')" '
          + 'style="padding:.5rem 1rem;border-bottom:1px solid #1e2d40;cursor:pointer;display:flex;align-items:center;gap:.6rem" '
          + 'onmouseover="this.style.background=\'rgba(255,255,255,.02)\'" onmouseout="this.style.background=\'\'">'
          + '<span style="width:6px;height:6px;border-radius:50%;background:' + sc + ';flex-shrink:0"></span>'
          + '<div style="flex:1;min-width:0">'
          + '<div style="font-size:10px;font-weight:700;color:#e2e8f0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">' + E(r.account_name||r.customer_name) + '</div>'
          + '<div style="font-size:8.5px;color:#475569;margin-top:1px">' + E(r.assigned_cse||'—') + (r.region ? ' \u00b7 ' + E(r.region) : '') + '</div>'
          + '</div>'
          + (r.churn_risk ? '<span class="badge badge-amber" style="font-size:8px;padding:1px 5px;flex-shrink:0">' + E(r.churn_risk) + '</span>' : '')
          + '</div>';
      }).join('');
    }).catch(console.error);
}

// ── CSE workload ─────────────────────────────────────────────────
function loadCSE() {
  fetch('/api/cse-workload?theatre=' + encodeURIComponent(_theatre))
    .then(function(r){return r.json();})
    .then(function(rows) {
      var top5 = (rows||[]).slice(0, 5);
      var maxBlocked = top5.reduce(function(m,r){return Math.max(m, r.blocked||0);}, 1);
      var container = document.getElementById('cse-bars');
      if (!top5.length) {
        container.innerHTML = '<div style="font-size:10px;color:#475569">No data</div>';
        return;
      }
      container.innerHTML = top5.map(function(r) {
        var pct = Math.round((r.blocked||0) / maxBlocked * 100);
        return '<div style="display:flex;align-items:center;gap:.75rem">'
          + '<div style="font-size:10px;color:#e2e8f0;font-weight:600;width:100px;flex-shrink:0;font-family:\'JetBrains Mono\',monospace">' + E(r.cse||r.active_cse||'—') + '</div>'
          + '<div style="flex:1;background:#1e2d40;border-radius:4px;height:10px">'
          + '<div style="background:#22d3ee;height:100%;border-radius:4px;width:' + pct + '%"></div>'
          + '</div>'
          + '<div style="font-size:10px;color:#475569;font-family:\'JetBrains Mono\',monospace;width:50px;text-align:right">'
          + (r.blocked||0) + ' blocked</div>'
          + '</div>';
      }).join('');
    }).catch(function() {
      // Fallback: try /api/cse
      fetch('/api/cse').then(function(r){return r.json();}).then(function(rows) {
        var top5 = (rows||[]).slice(0, 5);
        var maxT = top5.reduce(function(m,r){return Math.max(m, r.total||0);}, 1);
        var container = document.getElementById('cse-bars');
        container.innerHTML = top5.map(function(r) {
          var pct = Math.round((r.total||0) / maxT * 100);
          return '<div style="display:flex;align-items:center;gap:.75rem">'
            + '<div style="font-size:10px;color:#e2e8f0;font-weight:600;width:100px;flex-shrink:0;font-family:\'JetBrains Mono\',monospace">' + E(r.active_cse||'—') + '</div>'
            + '<div style="flex:1;background:#1e2d40;border-radius:4px;height:10px">'
            + '<div style="background:#22d3ee;height:100%;border-radius:4px;width:' + pct + '%"></div>'
            + '</div>'
            + '<div style="font-size:10px;color:#475569;font-family:\'JetBrains Mono\',monospace;width:60px;text-align:right">'
            + (r.total||0) + ' total</div>'
            + '</div>';
        }).join('');
      }).catch(function(){
        document.getElementById('cse-bars').innerHTML = '<div style="font-size:10px;color:#475569">No data</div>';
      });
    });
}

// ── Refresh pipeline ──────────────────────────────────────────────
function refreshData() {
  var console_el = document.getElementById('pipeline-console');
  console_el.style.display = 'block';
  console_el.innerHTML = '<div style="color:#475569;margin-bottom:4px">&#9654; Starting pipeline...</div>';
  var es = new EventSource('/api/run-full');
  es.onmessage = function(e) {
    try {
      var d = JSON.parse(e.data);
      var line = document.createElement('div');
      var colorMap = {green:'#10b981', red:'#ef4444', amber:'#f59e0b', teal:'#22d3ee', muted:'#475569'};
      line.style.color = colorMap[d.color] || '#e2e8f0';
      line.textContent = '[' + (d.step||'') + '] ' + (d.detail||d.status||'');
      console_el.appendChild(line);
      console_el.scrollTop = console_el.scrollHeight;
      if (d.status === 'done' || d.done) {
        es.close();
        loadAll();
        S.syncSummary({m9:0, blocked:0, resolved:0});
        setTimeout(function(){console_el.style.display='none';}, 5000);
      }
    } catch(ex) {}
  };
  es.onerror = function() { es.close(); };
}

// ── Load all ──────────────────────────────────────────────────────
function loadAll() {
  loadMilestones();
  loadSLA();
  loadM1();
  loadCSE();
}

initTheatre();
loadAll();
setInterval(loadAll, 60000);
</script>
</body>
</html>
