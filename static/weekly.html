<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>&#x2600;</text></svg>">
<title>Solstice — Weekly</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="/static/solstice.css">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
</head>
<body style="background:#0a0e1a;color:#e2e8f0;min-height:100vh">
<nav id="s-nav" style="display:flex;align-items:center;padding:.6rem 1.5rem;background:#0f1729;border-bottom:1px solid #1e2d40;gap:12px"></nav>
<div id="main" style="padding:1.5rem"></div>
<script src="/static/solstice.js"></script>
<script>
S.initNav('weekly');
S.restoreCard();
var params=new URLSearchParams(location.search);
var currentDate=params.get('date')||'';
var theatre=params.get('theatre')||'';
function prevWeek(){var d=currentDate?new Date(currentDate):new Date();d.setDate(d.getDate()-7);currentDate=d.toISOString().slice(0,10);load();}
function nextWeek(){var d=currentDate?new Date(currentDate):new Date();d.setDate(d.getDate()+7);currentDate=d.toISOString().slice(0,10);load();}
function load(){
  var qp=[];if(currentDate)qp.push('date='+currentDate);if(theatre)qp.push('theatre='+encodeURIComponent(theatre));
  fetch('/api/weekly-movements'+(qp.length?'?'+qp.join('&'):'')).then(function(r){return r.json();}).then(render).catch(function(){});
}
function _section(title,color,items,dateField){
  if(!items.length)return '';
  var rows=items.map(function(a){
    var aid=(a.account_id||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'");
    return '<div onclick="S.openAccountCard(\''+aid+'\')" style="display:flex;justify-content:space-between;align-items:center;padding:8px 12px;border-bottom:1px solid #1e2d40;cursor:pointer" onmouseover="this.style.background=\'#1e2d40\'" onmouseout="this.style.background=\'\'">'
      +'<div><div style="font-size:11px;font-weight:600;color:#e2e8f0">'+S.esc(a.customer_name||'')+'</div>'
      +'<div style="font-size:9px;color:#475569">'+S.esc(a.active_cse||'—')+' · '+S.esc(a.sales_region||'—')+'</div></div>'
      +'<span style="font-size:10px;color:#475569">'+String(a[dateField]||'').slice(0,10)+'</span></div>';
  }).join('');
  return '<div style="background:#0f1729;border:1px solid #1e2d40;border-radius:6px;overflow:hidden;margin-bottom:1rem">'
    +'<div style="padding:10px 12px;border-bottom:1px solid #1e2d40;display:flex;justify-content:space-between">'
    +'<span style="font-size:10px;font-weight:700;color:'+color+';letter-spacing:1px;text-transform:uppercase">'+title+'</span>'
    +'<span style="font-size:10px;color:#475569">'+items.length+'</span></div>'+rows+'</div>';
}
function render(data){
  var main=document.getElementById('main');
  var total=(data.new_m9||[]).length+(data.m8_started||[]).length+(data.newly_blocked||[]).length+(data.resolved||[]).length;
  main.innerHTML='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem;flex-wrap:wrap;gap:.5rem">'
    +'<div><h1 style="font-size:1.1rem;font-weight:700;color:#f0f6fc;font-family:monospace">WEEKLY MOVEMENTS</h1>'
    +'<div style="font-size:10px;color:#475569;margin-top:2px">Week of '+(data.week_of||'')+'  · '+total+' movements</div></div>'
    +'<div style="display:flex;gap:.5rem;align-items:center">'
    +'<button onclick="prevWeek()" style="background:#0f1729;border:1px solid #1e2d40;color:#e2e8f0;padding:4px 10px;border-radius:4px;cursor:pointer;font-size:11px">← Prev</button>'
    +'<button onclick="nextWeek()" style="background:#0f1729;border:1px solid #1e2d40;color:#e2e8f0;padding:4px 10px;border-radius:4px;cursor:pointer;font-size:11px">Next →</button>'
    +'</div></div>'
    +(total===0?'<p style="color:#475569">No movements this week.</p>':'')
    +_section('✓ New M9 Complete','#10b981',data.new_m9||[],'m9_actual')
    +_section('→ M8 Started','#22d3ee',data.m8_started||[],'m8_actual')
    +_section('🛑 Newly Blocked','#ef4444',data.newly_blocked||[],'')
    +_section('✓ Resolved','#10b981',data.resolved||[],'');
}
load();
</script>
</body></html>
