<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>&#x2600;</text></svg>">
<title>Solstice — Weekly</title>

<link rel="stylesheet" href="/static/solstice.css">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
<nav id="s-nav" class="s-nav"></nav>
<div id="main" class="s-main"></div>
<script src="/static/solstice.js"></script>
<script>
S.initNav('weekly');
S.restoreCard();
var params=new URLSearchParams(location.search);
var currentDate=params.get('date')||'';
var theatre=params.get('theatre')||'';
function prevWeek(){var d=currentDate?new Date(currentDate):new Date();d.setDate(d.getDate()-7);currentDate=d.toISOString().slice(0,10);load();}
function nextWeek(){var d=currentDate?new Date(currentDate):new Date();d.setDate(d.getDate()+7);currentDate=d.toISOString().slice(0,10);load();}
function load(){
  var qp=[];if(currentDate)qp.push('date='+currentDate);if(theatre)qp.push('theatre='+encodeURIComponent(theatre));
  fetch('/api/weekly-movements'+(qp.length?'?'+qp.join('&'):'')).then(function(r){return r.json();}).then(render).catch(function(){});
}
function _section(title,color,items,dateField){
  if(!items.length)return '';
  var rows=items.map(function(a){
    var aid=(a.account_id||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'");
    return '<div onclick="S.openAccountCard(\''+aid+'\')" style="display:flex;justify-content:space-between;align-items:center;padding:8px 12px;border-bottom:1px solid var(--border-soft);cursor:pointer" onmouseover="this.style.background=\'var(--surface-2)\'" onmouseout="this.style.background=\'\'">'
      +'<div><div style="font-size:11px;font-weight:600;color:var(--text)">'+S.esc(a.customer_name||'')+'</div>'
      +'<div style="font-size:9px;color:var(--muted)">'+S.esc(a.active_cse||'—')+' · '+S.esc(a.sales_region||'—')+'</div></div>'
      +'<span style="font-size:10px;color:var(--muted)">'+String(a[dateField]||'').slice(0,10)+'</span></div>';
  }).join('');
  return '<div class="card" style="margin-bottom:1rem">'
    +'<div class="card-head">'
    +'<span class="card-title" style="color:'+color+'">'+title+'</span>'
    +'<span class="badge badge-gray">'+items.length+'</span></div>'+rows+'</div>';
}
function render(data){
  var main=document.getElementById('main');
  var total=(data.new_m9||[]).length+(data.m8_started||[]).length+(data.newly_blocked||[]).length+(data.resolved||[]).length;
  main.innerHTML='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem;flex-wrap:wrap;gap:.5rem">'
    +'<div><h1 style="font-size:1rem;font-weight:800;color:var(--text)">Weekly Movements</h1>'
    +'<div style="font-size:10px;color:var(--muted);margin-top:2px">Week of '+(data.week_of||'')+'  · '+total+' movements</div></div>'
    +'<div style="display:flex;gap:.5rem;align-items:center">'
    +'<button onclick="prevWeek()" class="pill">← Prev</button>'
    +'<button onclick="nextWeek()" class="pill">Next →</button>'
    +'</div></div>'
    +(total===0?'<p class="text-muted">No movements this week.</p>':'')
    +_section('New M9 Complete','var(--green)',data.new_m9||[],'m9_actual')
    +_section('M8 Started','var(--sky)',data.m8_started||[],'m8_actual')
    +_section('Newly Blocked','var(--red)',data.newly_blocked||[],'')
    +_section('Resolved','var(--green)',data.resolved||[],'');
}
load();
</script>
</body></html>
