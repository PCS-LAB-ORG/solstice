<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="icon" href="data:image/svg+xml,%3Csvg%20xmlns%3D%27http%3A//www.w3.org/2000/svg%27%20viewBox%3D%270%200%20100%20100%27%3E%3Ctext%20y%3D%27.9em%27%20font-size%3D%2790%27%3E%E2%98%80%3C/text%3E%3C/svg%3E">
<title>Solstice — Audit Log</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0D1117;--card:#161B22;--border:#21262D;--text:#E6EDF3;--muted:#8B949E;--teal:#14B8A6;--green:#22C55E;--amber:#F59E0B;--red:#EF4444;--purple:#A78BFA;--mono:'Geist Mono',monospace}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
.nav-link{font-size:10.5px;color:var(--muted);text-decoration:none;padding:4px 12px;border-radius:5px;border:1px solid transparent}
.nav-link:hover{background:rgba(255,255,255,.05);color:var(--text)}
.nav-link.active{color:var(--text);background:rgba(255,255,255,.08);border-color:var(--border)}
.page{max-width:1100px;margin:0 auto;padding:1.25rem 1.5rem}
.stats{display:grid;grid-template-columns:repeat(6,1fr);gap:.6rem;margin-bottom:1.1rem}
.stat{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:.6rem 1rem;text-align:center}
.stat .n{font-size:22px;font-weight:700}
.stat .l{font-size:8px;text-transform:uppercase;letter-spacing:.09em;color:var(--muted);margin-top:2px}
.fbar{display:flex;gap:.5rem;align-items:center;flex-wrap:wrap;margin-bottom:1.1rem}
.fbar input{background:var(--card);border:1px solid var(--border);border-radius:5px;color:var(--text);font-size:9px;padding:5px 10px;flex:1;min-width:200px;outline:none}
select.fsel{background:var(--card);border:1px solid var(--border);border-radius:5px;color:var(--muted);font-size:9px;padding:5px 8px;font-family:var(--mono)}
.day-grp{margin-bottom:1.25rem}
.day-hdr{font-size:8px;font-family:var(--mono);letter-spacing:.1em;color:#484F58;padding:.3rem 0 .35rem;border-bottom:1px solid rgba(33,38,45,.6);margin-bottom:.4rem;display:flex;align-items:center;gap:.5rem}
.day-cnt{color:#30363D}
.entry{display:grid;grid-template-columns:3px 1fr;gap:0 .65rem;margin-bottom:.28rem}
.bar{border-radius:2px;align-self:stretch;margin:.15rem 0}
.body{background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.06);border-radius:6px;padding:.45rem .75rem}
.body.glow-m9{box-shadow:0 0 12px rgba(34,197,94,.12);border-color:rgba(34,197,94,.2)}
.body.glow-m8{border-color:rgba(20,184,166,.14)}
.body.glow-reg{border-color:rgba(239,68,68,.18)}
.etop{display:flex;align-items:center;gap:.4rem;margin-bottom:.2rem}
.ebadge{font-family:var(--mono);font-size:7.5px;font-weight:700;padding:1px 6px;border-radius:3px}
.eacct{font-size:10px;font-weight:700}
.etime{margin-left:auto;font-family:var(--mono);font-size:8px;color:#484F58}
.echg{font-family:var(--mono);font-size:9px;margin-bottom:.18rem}
.emeta{font-size:8px;color:#6E7681;display:flex;gap:.5rem;align-items:center}
.empty{padding:2rem;text-align:center;color:var(--muted);font-size:11px}
</style>
</head>
<body>
<nav style="background:#161B22;border-bottom:1px solid #21262D;padding:.6rem 1.5rem;display:flex;align-items:center;gap:.25rem;position:sticky;top:0;z-index:100">
  <span style="font-weight:800;font-size:12px;color:#14B8A6;letter-spacing:.05em;margin-right:1rem">SOLSTICE</span>
  <a href="/ops" class="nav-link">Ops</a>
  <a href="/blockers" class="nav-link">Blockers</a>
  <a href="/forecast" class="nav-link">Forecast</a>
  <a href="/daily" class="nav-link">Daily</a>
  <a href="/audit" class="nav-link">Audit</a>
  <div style="margin-left:auto;position:relative;display:flex;align-items:center">
    <input type="text" id="g-search" placeholder="&#128269; Account..." autocomplete="off"
      style="background:rgba(255,255,255,.05);border:1px solid #21262D;border-radius:4px;color:#E6EDF3;font-size:10px;padding:.28rem .65rem;width:150px;outline:none;font-family:'Geist Mono',monospace;transition:width .2s"
      oninput="gSearch(this.value)" onfocus="this.style.width='210px'" onblur="setTimeout(function(){document.getElementById('g-search').style.width='150px';},200)">
    <div id="g-results" style="display:none;position:absolute;top:calc(100% + 4px);right:0;width:300px;background:#161B22;border:1px solid #21262D;border-radius:6px;max-height:300px;overflow-y:auto;z-index:500;box-shadow:0 8px 24px rgba(0,0,0,.7)"></div>
  </div>
</nav>
<div class="page">
  <div class="stats" id="stats"></div>
  <div class="fbar">
    <input id="f-search" placeholder="Search accounts..." oninput="render()">
    <select class="fsel" id="f-theatre" onchange="load()">
      <option value="">All Theatres</option>
      <option value="EMEA">EMEA</option>
      <option value="AMER">AMER/NAM</option>
      <option value="JAPAC">JAPAC</option>
      <option value="LATAM">LATAM</option>
    </select>
    <select class="fsel" id="f-field" onchange="render()">
      <option value="">All Fields</option>
      <option value="M9 Upgrade Complete">M9 Complete</option>
      <option value="M8 Upgrade Started">M8 Started</option>
      <option value="M3 Buy-in">M3 Buy-in</option>
      <option value="M1 Outreach">M1 Outreach</option>
      <option value="cse">CSE Change</option>
    </select>
    <select class="fsel" id="f-sort" onchange="render()">
      <option value="asc">Oldest First</option>
      <option value="desc">Newest First</option>
    </select>
  </div>
  <div id="timeline"></div>
</div>
<script>
var E=function(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');};
var _rows=[];
var MONTHS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
var MC={'M9 Upgrade Complete':'#22C55E','M8 Upgrade Started':'#14B8A6','M7 Legal':'#8B5CF6',
  'M5 Tech Validation':'#3B82F6','M4 Discovery':'#06b6d4','M3 Buy-in':'#F59E0B',
  'M2 Entitlements':'#F97316','M1 Outreach':'#A78BFA','cse':'#EC4899','status':'#8B949E'};
var MI={'M9 Upgrade Complete':'M9','M8 Upgrade Started':'M8','M7 Legal':'M7',
  'M5 Tech Validation':'M5','M4 Discovery':'M4','M3 Buy-in':'M3',
  'M2 Entitlements':'M2','M1 Outreach':'M1','cse':'CSE','status':'STS'};
var TH_C={'EMEA':'#14B8A6','AMER':'#3B82F6','JAPAC':'#8B5CF6','LATAM':'#F59E0B'};

function load(){
  var theatre=document.getElementById('f-theatre').value;
  fetch('/api/audit-log?theatre='+encodeURIComponent(theatre)).then(function(r){return r.json();}).then(function(rows){
    _rows=rows;
    var m9=rows.filter(function(r){return r.field_name==='M9 Upgrade Complete';}).length;
    var m8=rows.filter(function(r){return r.field_name==='M8 Upgrade Started';}).length;
    var m3=rows.filter(function(r){return r.field_name==='M3 Buy-in';}).length;
    var cse=rows.filter(function(r){return r.field_name==='cse';}).length;
    var reg=rows.filter(function(r){return r.old_status==='Y'&&r.new_status==='N';}).length;
    document.getElementById('stats').innerHTML=
      '<div class="stat"><div class="n" style="color:#22C55E">'+m9+'</div><div class="l">M9 Complete</div></div>'
      +'<div class="stat"><div class="n" style="color:#14B8A6">'+m8+'</div><div class="l">M8 Started</div></div>'
      +'<div class="stat"><div class="n" style="color:#F59E0B">'+m3+'</div><div class="l">M3 Buy-in</div></div>'
      +'<div class="stat"><div class="n" style="color:#EC4899">'+cse+'</div><div class="l">CSE Changes</div></div>'
      +'<div class="stat"><div class="n" style="color:#EF4444">'+reg+'</div><div class="l">Regressions</div></div>'
      +'<div class="stat"><div class="n" style="color:var(--muted)">'+rows.length+'</div><div class="l">Total</div></div>';
    render();
  }).catch(function(){document.getElementById('timeline').innerHTML='<div class="empty">Error loading audit log</div>';});
}

function render(){
  var q=(document.getElementById('f-search').value||'').toLowerCase();
  var ff=document.getElementById('f-field').value;
  var sort=document.getElementById('f-sort').value;
  var rows=_rows.filter(function(r){
    if(ff&&r.field_name!==ff)return false;
    if(q&&!((r.customer_name||r.new_status||'')+(r.active_cse||'')).toLowerCase().indexOf(q)>=0)return false;
    return true;
  });
  if(sort==='desc')rows=rows.slice().reverse();
  if(!rows.length){document.getElementById('timeline').innerHTML='<div class="empty">No entries match filters</div>';return;}
  var byDay={},dayOrder=[];
  rows.forEach(function(r){
    var day=(r.changed_at||'').substring(0,10);
    var p=day.split('-');
    var label=p.length===3?p[2]+' '+(MONTHS[parseInt(p[1])-1]||p[1])+' '+p[0].substring(2):day;
    if(!byDay[day]){byDay[day]={label:label,entries:[]};dayOrder.push(day);}
    byDay[day].entries.push(r);
  });
  var html='';
  dayOrder.forEach(function(day){
    var grp=byDay[day];
    html+='<div class="day-grp">'
      +'<div class="day-hdr">'+E(grp.label)+' <span class="day-cnt">('+grp.entries.length+')</span></div>';
    grp.entries.forEach(function(r){
      var mc=MC[r.field_name]||'#8B949E';
      var mi=MI[r.field_name]||r.field_name||'?';
      var isM9=r.field_name==='M9 Upgrade Complete';
      var isM8=r.field_name==='M8 Upgrade Started';
      var isReg=r.old_status==='Y'&&r.new_status==='N';
      var isCse=r.field_name==='cse';
      if(isReg)mc='#EF4444';
      var glow=isM9?'glow-m9':isM8?'glow-m8':isReg?'glow-reg':'';
      var time=(r.changed_at||'').substring(11,16);
      var name=r.customer_name||r.new_status||'?';
      var th=r.account_theatre||'';
      var thcol=TH_C[th]||'';
      var chgHtml='';
      if(isCse){
        chgHtml='<span style="color:var(--muted)">'+E(r.old_status||'—')+'</span>'
          +' &#8594; <span style="color:'+mc+';font-weight:700">'+E(r.new_status||'—')+'</span>';
      } else if(isReg){
        chgHtml='<span style="color:#EF4444;font-weight:700">&#8595; REGRESSION: '+E(r.field_name)+'</span>';
      } else {
        chgHtml='<span style="color:'+mc+';font-weight:700">&#10003; '+E(r.field_name)+'</span>';
      }
      html+='<div class="entry">'
        +'<div class="bar" style="background:'+mc+'"></div>'
        +'<div class="body '+glow+'">'
          +'<div class="etop">'
            +'<span class="ebadge" style="background:'+mc+'22;color:'+mc+'">'+E(mi)+'</span>'
            +'<span class="eacct" style="color:'+(isM9?'#4ade80':isM8?'#5eead4':'var(--text)')+'">'+E(name)+'</span>'
            +(time?'<span class="etime">'+E(time)+'</span>':'')
          +'</div>'
          +'<div class="echg">'+chgHtml+'</div>'
          +'<div class="emeta">'
            +(r.active_cse?'<span>'+E(r.active_cse)+'</span>':'')
            +(th?'<span style="font-size:7px;font-weight:700;padding:1px 4px;border-radius:2px;background:'+thcol+'18;color:'+thcol+'">'+E(th)+'</span>':'')
          +'</div>'
        +'</div>'
      +'</div>';
    });
    html+='</div>';
  });
  document.getElementById('timeline').innerHTML=html;
}

document.querySelectorAll('.nav-link').forEach(function(a){if(window.location.pathname===a.getAttribute('href'))a.classList.add('active');});
load();
</script>
<!-- Global search + card -->
<div id="g-card" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:600;overflow-y:auto;padding:2rem 1rem" onclick="if(event.target===this)closeGCard()">
  <div id="g-card-inner" style="max-width:640px;margin:0 auto;background:#161B22;border:1px solid #21262D;border-radius:10px;overflow:hidden"></div>
</div>
<script>
var _gsT,_GE=function(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');};
function gSearch(q){
  clearTimeout(_gsT);
  var r=document.getElementById('g-results');
  if(!q||q.length<2){r.style.display='none';return;}
  _gsT=setTimeout(function(){
    fetch('/api/customer-search?q='+encodeURIComponent(q)).then(function(res){return res.json();}).then(function(d){
      if(!d||!d.length){r.style.display='none';return;}
      r.style.display='block';
      var SC={'green':'#22C55E','blocked':'#EF4444','at_risk':'#F59E0B'};
      r.innerHTML=d.map(function(a){
        var sc=SC[a.signal]||'#8B949E';
        return '<div onclick="openGCard(''+a.account_id+'')" style="padding:.5rem .8rem;cursor:pointer;border-bottom:1px solid rgba(33,38,45,.5);display:flex;align-items:center;gap:.5rem">'
          +'<span style="width:6px;height:6px;border-radius:50%;background:'+sc+';flex-shrink:0;display:inline-block"></span>'
          +'<div><div style="font-size:10px;font-weight:700;color:#E6EDF3">'+_GE(a.customer_name)+'</div>'
          +'<div style="font-size:8px;color:#8B949E">'+_GE(a.active_cse||'—')+' &middot; '+_GE(a.sales_region||'—')+(a.account_theatre?' &middot; '+_GE(a.account_theatre):'')+'</div></div></div>';
      }).join('');
    }).catch(function(){});
  },220);
}
function openGCard(id){
  document.getElementById('g-results').style.display='none';
  document.getElementById('g-search').value='';
  localStorage.setItem('g-last-card',id);
  document.getElementById('g-card').style.display='block';
  document.getElementById('g-card-inner').innerHTML='<div style="padding:2rem;text-align:center;color:#484F58;font-size:10px">Loading...</div>';
  fetch('/api/customer/'+id).then(function(r){return r.json();}).then(renderGCard).catch(function(){closeGCard();});
}
function closeGCard(){
  document.getElementById('g-card').style.display='none';
  localStorage.removeItem('g-last-card');
}
var _MSK=[['m0_complete',null,'M0'],['m1_complete','m1_planned','M1'],['m2_complete','m2_planned','M2'],
  ['m3_complete','m3_planned','M3'],['m4_complete','m4_planned','M4'],['m5_complete','m5_planned','M5'],
  ['m7_complete',null,'M7'],['m8_started','m8_planned','M8'],['m9_complete','m9_planned','M9']];
var _DCC={'Green':'#22C55E','Yellow':'#F59E0B','Red':'#EF4444'};
var _SGC={'green':'#22C55E','blocked':'#EF4444','at_risk':'#F59E0B'};
function fmtGD(s){
  if(!s||s==='—')return '—';
  var M=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  var m=/(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2,4})/.exec(s);
  if(m){return m[2]+' '+M[parseInt(m[1])-1];}
  var iso=/^(\d{4})-(\d{2})-(\d{2})/.exec(s);
  if(iso)return iso[3]+' '+M[parseInt(iso[2])-1];
  return s.substring(0,10);
}
function renderGCard(d){
  var dcc=_DCC[d.dc_progress]||'#8B949E';
  var sig=_SGC[d.signal]||'#8B949E';
  var chc={'Red':'#EF4444','Yellow':'#F59E0B','Green':'#22C55E'}[d.churn_risk]||'#8B949E';
  var msBar=_MSK.map(function(mk,i){
    var done=d[mk[0]];var plan=mk[1]?d[mk[1]]:null;
    var c=done?dcc:'rgba(255,255,255,.08)';var tc=done?dcc:'#484F58';
    return '<div style="flex:1;text-align:center">'
      +'<div style="height:4px;border-radius:2px;background:'+c+';margin-bottom:2px"></div>'
      +'<div style="font-size:6.5px;color:'+tc+'">'+mk[2]+'</div>'
      +(plan&&!done?'<div style="font-size:6px;color:#484F58">'+fmtGD(plan)+'</div>':'')
      +'</div>'+(i<8?'<div style="color:#21262D;font-size:8px;padding-bottom:6px">&#8250;</div>':'');
  }).join('');
  var hist=(d.history||[]).slice(-6).reverse().map(function(h){
    var isReg=h.old_status==='Y'&&h.new_status==='N';
    var hc=isReg?'#EF4444':'#22C55E';
    return '<div style="display:flex;align-items:center;gap:.4rem;padding:.2rem 0;border-bottom:1px solid rgba(33,38,45,.4);font-size:8.5px">'
      +'<span style="font-family:monospace;color:#484F58;font-size:7.5px;flex-shrink:0;min-width:60px">'+_GE((h.changed_at||'').substring(0,10))+'</span>'
      +'<span style="color:'+hc+';font-weight:700;flex:1">'+_GE(h.field_name||'change')+'</span>'
      +(isReg?'<span style="color:#EF4444;font-size:7.5px;font-weight:700">REGRESSION</span>':'<span style="color:#22C55E;font-size:9px">&#10003;</span>')
      +'</div>';
  }).join('');
  var meta=[['Rep',d.cc_rep],['DSM',d.cc_dsm],['Cohort',(d.cohort||'').split(' ')[0]],['Renewal',fmtGD(d.next_renewal_date)],['Weeks',d.upgrade_duration_weeks],['Workloads',d.posture_workloads]];
  document.getElementById('g-card-inner').innerHTML=
    '<div style="background:'+dcc+'18;border-bottom:3px solid '+dcc+';padding:.75rem 1rem;display:flex;align-items:flex-start;justify-content:space-between">'
      +'<div><div style="font-size:15px;font-weight:700;color:#E6EDF3">'+(d.live_fire?'&#128293; ':'')+_GE(d.customer_name)+'</div>'
      +'<div style="font-size:9px;color:#8B949E;margin-top:3px">'+_GE(d.active_cse||'—')+' &middot; '+_GE(d.sales_region||'—')+' &middot; '+_GE(d.account_theatre||'—')+'</div></div>'
      +'<button onclick="closeGCard()" style="background:rgba(255,255,255,.08);border:1px solid #21262D;color:#8B949E;border-radius:4px;padding:.25rem .6rem;cursor:pointer;font-size:12px;flex-shrink:0;margin-left:.5rem">&#10005;</button>'
    +'</div>'
    +'<div style="display:flex;gap:.4rem;padding:.5rem 1rem;border-bottom:1px solid #21262D;flex-wrap:wrap">'
      +'<span style="font-size:8px;padding:2px 7px;border-radius:3px;font-weight:700;background:'+sig+'18;color:'+sig+'">'+_GE(d.signal||'—')+'</span>'
      +'<span style="font-size:8px;padding:2px 7px;border-radius:3px;font-weight:700;background:'+dcc+'18;color:'+dcc+'">DC: '+_GE(d.dc_progress||'—')+'</span>'
      +'<span style="font-size:8px;padding:2px 7px;border-radius:3px;background:'+chc+'18;color:'+chc+'">Churn: '+_GE(d.churn_risk||'—')+'</span>'
      +'<span style="font-size:8px;padding:2px 7px;border-radius:3px;background:rgba(255,255,255,.04);color:#8B949E;margin-left:auto">'+_GE(d.status||'—')+'</span>'
    +'</div>'
    +'<div style="padding:.6rem 1rem;border-bottom:1px solid #21262D">'
      +'<div style="font-size:7px;color:#484F58;text-transform:uppercase;letter-spacing:.1em;margin-bottom:.4rem">Migration Progress</div>'
      +'<div style="display:flex;align-items:flex-end;gap:0">'+msBar+'</div>'
    +'</div>'
    +(d.status_detail||d.upgrade_notes?'<div style="padding:.6rem 1rem;border-bottom:1px solid #21262D;font-size:8.5px;color:#6E7681;line-height:1.5">'+_GE((d.status_detail||'').substring(0,200))+(d.upgrade_notes?'<div style="color:#484F58;margin-top:.25rem">'+_GE(d.upgrade_notes.substring(0,180))+'</div>':'')+'</div>':'')
    +'<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:#21262D;border-bottom:1px solid #21262D">'
      +meta.map(function(x){return '<div style="background:#161B22;padding:.4rem .65rem"><div style="font-size:7px;color:#484F58;text-transform:uppercase">'+x[0]+'</div><div style="font-size:9px;color:#E6EDF3">'+_GE(String(x[1]||'—').substring(0,16))+'</div></div>';}).join('')
    +'</div>'
    +'<div style="padding:.6rem 1rem">'
      +'<div style="font-size:7px;color:#484F58;text-transform:uppercase;letter-spacing:.1em;margin-bottom:.3rem">Recent Changes</div>'
      +(hist||'<div style="font-size:8px;color:#484F58">No history</div>')
    +'</div>';
}
document.addEventListener('keydown',function(e){if(e.key==='Escape')closeGCard();});
document.addEventListener('click',function(e){if(!e.target.closest('#g-search')&&!e.target.closest('#g-results'))document.getElementById('g-results').style.display='none';});
(function(){var last=localStorage.getItem('g-last-card');if(last){document.getElementById('g-card').style.display='block';document.getElementById('g-card-inner').innerHTML='<div style="padding:2rem;text-align:center;color:#484F58;font-size:10px">Loading...</div>';fetch('/api/customer/'+last).then(function(r){return r.json();}).then(renderGCard).catch(function(){closeGCard();});}})();
</script>
</body>
</html>
