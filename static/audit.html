<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>&#x2600;</text></svg>">
<title>Solstice — Audit Log</title>

<link rel="stylesheet" href="/static/solstice.css">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:.65rem 1rem;text-align:center;box-shadow:var(--shadow-sm)}
.stat-n{font-size:22px;font-weight:700;line-height:1;font-family:var(--mono)}
.stat-l{font-size:8px;text-transform:uppercase;letter-spacing:.09em;color:var(--muted);margin-top:3px;font-family:var(--mono)}
.fbar{display:flex;gap:.5rem;align-items:center;flex-wrap:wrap;margin-bottom:1rem}
.fbar input{background:var(--surface);border:1px solid var(--border);border-radius:5px;color:var(--text);font-size:9px;padding:5px 10px;flex:1;min-width:200px;outline:none;font-family:var(--mono);transition:border-color .15s}
.fbar input:focus{border-color:var(--sky)}
select.fsel{background:var(--surface);border:1px solid var(--border);border-radius:5px;color:var(--muted);font-size:9px;padding:5px 8px;font-family:var(--mono);cursor:pointer;transition:border-color .15s}
select.fsel:focus{outline:none;border-color:var(--sky)}
.export-btn{background:var(--sky-light);border:1px solid var(--sky-border);color:var(--sky);font-size:9px;font-weight:700;padding:5px 12px;border-radius:5px;cursor:pointer;font-family:var(--mono);white-space:nowrap;transition:all .15s}
.export-btn:hover{background:#bae6fd;border-color:var(--sky)}
.day-grp{margin-bottom:1.1rem}
.day-hdr{font-size:8px;font-family:var(--mono);letter-spacing:.1em;color:var(--muted);padding:.3rem 0 .35rem;border-bottom:1px solid var(--border);margin-bottom:.4rem;display:flex;align-items:center;gap:.5rem}
.day-cnt{color:var(--muted)}
.entry{display:grid;grid-template-columns:3px 1fr;gap:0 .65rem;margin-bottom:.28rem}
.bar{border-radius:2px;align-self:stretch;margin:.15rem 0}
.body{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:.45rem .75rem;transition:border-color .15s;box-shadow:var(--shadow-sm)}
.body:hover{border-color:var(--sky-border)}
.body.glow-m9{box-shadow:0 0 8px rgba(16,185,129,.15);border-color:#6ee7b7}
.body.glow-m8{border-color:var(--sky-border)}
.body.glow-reg{border-color:#fca5a5}
.etop{display:flex;align-items:center;gap:.4rem;margin-bottom:.2rem}
.ebadge{font-family:var(--mono);font-size:7.5px;font-weight:700;padding:1px 6px;border-radius:3px}
.eacct{font-size:10px;font-weight:700;color:var(--text)}
.etime{margin-left:auto;font-family:var(--mono);font-size:8px;color:var(--muted)}
.echg{font-family:var(--mono);font-size:9px;margin-bottom:.18rem;color:var(--text-2)}
.emeta{font-size:8px;color:var(--muted);display:flex;gap:.5rem;align-items:center}
.empty{padding:2rem;text-align:center;color:var(--muted);font-size:11px}
.range-tag{font-size:8px;color:var(--muted);font-family:var(--mono);background:var(--surface);border:1px solid var(--border);border-radius:4px;padding:2px 8px}
</style>
</head>
<body>
<nav id="s-nav" class="s-nav"></nav>

<div id="main" class="s-main">

  <!-- Stats bar -->
  <div style="display:grid;grid-template-columns:repeat(6,1fr);gap:.6rem;margin-bottom:1rem" id="stats"></div>

  <!-- Filter bar -->
  <div class="fbar">
    <input id="f-search" placeholder="Search accounts or CSE…" oninput="renderRows()">
    <select class="fsel" id="f-theatre" onchange="loadAudit()">
      <option value="">All Theatres</option>
      <option value="EMEA">EMEA</option>
      <option value="AMER">AMER</option>
      <option value="JAPAC">JAPAC</option>
      <option value="LATAM">LATAM</option>
    </select>
    <select class="fsel" id="f-field" onchange="renderRows()">
      <option value="">All Fields</option>
      <option value="M9 Upgrade Complete">M9 Complete</option>
      <option value="M8 Upgrade Started">M8 Started</option>
      <option value="M3 Buy-in">M3 Buy-in</option>
      <option value="M1 Outreach">M1 Outreach</option>
      <option value="cse">CSE Change</option>
      <option value="status">Status Change</option>
    </select>
    <select class="fsel" id="f-sort" onchange="renderRows()">
      <option value="desc">Newest First</option>
      <option value="asc">Oldest First</option>
    </select>
    <span id="date-range-tag" class="range-tag">—</span>

  </div>

  <!-- Timeline -->
  <div id="timeline"></div>

</div>

<script src="/static/solstice.js?v=4"></script>
<script>
S.initNav('audit'); S.restoreCard();

var E=S.esc;
var _rows=[];
var MONTHS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
var MC={'M9 Upgrade Complete':'#10b981','M8 Upgrade Started':'#0ea5e9','M7 Legal':'#8b5cf6',
  'M5 Tech Validation':'#3b82f6','M4 Discovery':'#06b6d4','M3 Buy-in':'#f59e0b',
  'M2 Entitlements':'#f97316','M1 Outreach':'#a78bfa','cse':'#ec4899','status':'#94a3b8'};
var MI={'M9 Upgrade Complete':'M9','M8 Upgrade Started':'M8','M7 Legal':'M7',
  'M5 Tech Validation':'M5','M4 Discovery':'M4','M3 Buy-in':'M3',
  'M2 Entitlements':'M2','M1 Outreach':'M1','cse':'CSE','status':'STS'};
var TH_C={'EMEA':'#0ea5e9','AMER':'#3b82f6','JAPAC':'#a78bfa','LATAM':'#f59e0b'};

function loadAudit(){
  var theatre=document.getElementById('f-theatre').value;
  document.getElementById('timeline').innerHTML='<div class="empty">Loading…</div>';
  fetch('/api/audit-log?theatre='+encodeURIComponent(theatre))
    .then(function(r){return r.json();})
    .then(function(rows){
      _rows=rows;
      buildStats(rows);
      buildDateRange(rows);
      renderRows();
    })
    .catch(function(){document.getElementById('timeline').innerHTML='<div class="empty">Error loading audit log</div>';});
}

function buildStats(rows){
  var m9=0,m8=0,m3=0,cse=0,reg=0;
  rows.forEach(function(r){
    if(r.field_name==='M9 Upgrade Complete')m9++;
    else if(r.field_name==='M8 Upgrade Started')m8++;
    else if(r.field_name==='M3 Buy-in')m3++;
    else if(r.field_name==='cse')cse++;
    if(r.old_status==='Y'&&r.new_status==='N')reg++;
  });
  // Unique accounts
  var accts=new Set(rows.map(function(r){return r.customer_name;}));
  document.getElementById('stats').innerHTML=
    stat(m9,'#10b981','M9 Complete')
    +stat(m8,'#0ea5e9','M8 Started')
    +stat(m3,'#f59e0b','M3 Buy-in')
    +stat(cse,'#ec4899','CSE Changes')
    +stat(reg,'#ef4444','Regressions')
    +stat(accts.size,'var(--muted)','Unique Accts');
}

function stat(n,c,l){
  return '<div class="stat"><div class="stat-n" style="color:'+c+'">'+n+'</div><div class="stat-l">'+E(l)+'</div></div>';
}

function buildDateRange(rows){
  if(!rows.length){document.getElementById('date-range-tag').textContent='No data';return;}
  var dates=rows.map(function(r){return (r.changed_at||'').substring(0,10);}).filter(Boolean).sort();
  var first=dates[0],last=dates[dates.length-1];
  document.getElementById('date-range-tag').textContent=fmtDay(first)+' → '+fmtDay(last);
}

function fmtDay(iso){
  if(!iso)return '—';
  var p=iso.split('-');
  if(p.length===3)return p[2]+' '+(MONTHS[parseInt(p[1],10)-1]||p[1])+' '+p[0].slice(2);
  return iso;
}

function renderRows(){
  var q=(document.getElementById('f-search').value||'').toLowerCase();
  var ff=document.getElementById('f-field').value;
  var sort=document.getElementById('f-sort').value;
  var rows=_rows.filter(function(r){
    if(ff&&r.field_name!==ff)return false;
    if(q){
      var haystack=((r.customer_name||r.new_status||'')+' '+(r.active_cse||'')).toLowerCase();
      if(haystack.indexOf(q)<0)return false;
    }
    return true;
  });
  if(sort==='asc')rows=rows.slice().reverse();
  if(!rows.length){document.getElementById('timeline').innerHTML='<div class="empty">No entries match filters</div>';return;}
  var byDay={},dayOrder=[];
  rows.forEach(function(r){
    var day=(r.changed_at||'').substring(0,10);
    if(!byDay[day]){byDay[day]={label:fmtDay(day),entries:[]};dayOrder.push(day);}
    byDay[day].entries.push(r);
  });
  var html='';
  dayOrder.forEach(function(day){
    var grp=byDay[day];
    html+='<div class="day-grp">'
      +'<div class="day-hdr">'+E(grp.label)+' <span class="day-cnt">('+grp.entries.length+')</span></div>';
    grp.entries.forEach(function(r){
      var mc=MC[r.field_name]||'#94a3b8';
      var mi=MI[r.field_name]||r.field_name||'?';
      var isM9=r.field_name==='M9 Upgrade Complete';
      var isM8=r.field_name==='M8 Upgrade Started';
      var isReg=r.old_status==='Y'&&r.new_status==='N';
      var isCse=r.field_name==='cse';
      if(isReg)mc='#ef4444';
      var glow=isM9?'glow-m9':isM8?'glow-m8':isReg?'glow-reg':'';
      var time=(r.changed_at||'').substring(11,16);
      var name=r.customer_name||r.new_status||'?';
      var th=r.account_theatre||'';
      var thcol=TH_C[th]||'';
      var chgHtml='';
      if(isCse){
        chgHtml='<span style="color:var(--muted)">'+E(r.old_status||'—')+'</span> &#8594; <span style="color:'+mc+';font-weight:700">'+E(r.new_status||'—')+'</span>';
      } else if(isReg){
        chgHtml='<span style="color:var(--red);font-weight:700">&#8595; REGRESSION: '+E(r.field_name)+'</span>';
      } else {
        chgHtml='<span style="color:'+mc+';font-weight:700">&#10003; '+E(r.field_name)+'</span>';
      }
      html+='<div class="entry">'
        +'<div class="bar" style="background:'+mc+'"></div>'
        +'<div class="body '+glow+'">'
          +'<div class="etop">'
            +'<span class="ebadge" style="background:'+mc+'22;color:'+mc+'">'+E(mi)+'</span>'
            +'<span class="eacct" style="color:'+(isM9?'var(--green)':isM8?'var(--sky)':'var(--text)')+'">'+E(name)+'</span>'
            +(time?'<span class="etime">'+E(time)+'</span>':'')
          +'</div>'
          +'<div class="echg">'+chgHtml+'</div>'
          +'<div class="emeta">'
            +(r.active_cse&&r.active_cse!=='—'?'<span>'+E(r.active_cse)+'</span>':'')
            +(th?'<span style="font-size:7px;font-weight:700;padding:1px 4px;border-radius:2px;background:'+thcol+'18;color:'+thcol+'">'+E(th)+'</span>':'')
          +'</div>'
        +'</div>'
      +'</div>';
    });
    html+='</div>';
  });
  document.getElementById('timeline').innerHTML=html;
}

function exportAudit(){
  var ff=document.getElementById('f-field').value;
  var q=(document.getElementById('f-search').value||'').toLowerCase();
  var rows=_rows.filter(function(r){
    if(ff&&r.field_name!==ff)return false;
    if(q){
      var h=((r.customer_name||r.new_status||'')+' '+(r.active_cse||'')).toLowerCase();
      if(h.indexOf(q)<0)return false;
    }
    return true;
  });
  if(!rows.length){alert('No rows to export.');return;}
  S.exportCSV(rows, 'solstice-audit.csv');
}

loadAudit();
</script>
</body></html>
