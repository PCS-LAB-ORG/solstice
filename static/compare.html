<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>&#x2600;</text></svg>">
<title>Solstice — Compare</title>

<link rel="stylesheet" href="/static/solstice.css">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
<nav id="s-nav" class="s-nav"></nav>
<div id="main" class="s-main"></div>
<script src="/static/solstice.js?v=5"></script>
<script>
S.initNav('compare');
S.restoreCard();
fetch('/api/compare').then(function(r){return r.json();}).then(render).catch(function(){});
function render(data){
  var ts=data.theatres||[];
  var main=document.getElementById('main');
  var TH_COLS={'EMEA':'#0ea5e9','AMER':'#3b82f6','JAPAC':'#a78bfa','LATAM':'#f59e0b'};
  var metrics=[
    {key:'m9_this_week',label:'M9 This Week',color:'var(--sky)'},
    {key:'blocked',label:'Blocked',color:'var(--red)'},
    {key:'at_risk',label:'At Risk',color:'var(--amber)'},
    {key:'sla_overdue',label:'SLA Overdue',color:'var(--red)'},
  ];
  var maxVals={};
  metrics.forEach(function(m){maxVals[m.key]=Math.max.apply(null,ts.map(function(t){return t[m.key]||0;}).concat([1]));});
  var cols=ts.map(function(t){
    var thcol=TH_COLS[t.theatre]||'var(--sky)';
    var bars=metrics.map(function(m){
      var pct=Math.round(((t[m.key]||0)/maxVals[m.key])*100);
      return '<div><div style="display:flex;justify-content:space-between;margin-bottom:3px">'
        +'<span style="font-size:9px;color:var(--muted)">'+m.label+'</span>'
        +'<span style="font-size:10px;color:'+m.color+';font-family:var(--mono);font-weight:700">'+(t[m.key]||0)+'</span></div>'
        +'<div style="background:var(--surface-2);height:4px;border-radius:2px"><div style="background:'+m.color+';width:'+pct+'%;height:100%;border-radius:2px"></div></div></div>';
    }).join('');
    return '<div class="card">'
      +'<div class="card-head" style="background:'+thcol+'10;border-bottom:1px solid '+thcol+'30">'
        +'<span class="card-title" style="color:'+thcol+';font-size:11px;letter-spacing:2px">'+t.theatre+'</span>'
        +'<span class="badge" style="background:'+thcol+'15;color:'+thcol+'">Theatre</span>'
      +'</div>'
      +'<div style="padding:12px;text-align:center;border-bottom:1px solid var(--border)">'
        +'<div class="kpi-number" style="font-size:2.2rem;color:'+thcol+'">'+t.m9_total+'</div>'
        +'<div style="font-size:9px;color:var(--muted)">M9 total</div>'
      +'</div>'
      +'<div style="padding:12px;display:flex;flex-direction:column;gap:10px">'+bars+'</div></div>';
  }).join('');
  main.innerHTML='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem">'
    +'<h1 style="font-size:1rem;font-weight:800;color:var(--text)">Theatre Comparison</h1>'
    +'</div>'
    +'<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:1rem">'+cols+'</div>';
  window._cmpData=ts;
}
</script>
</body></html>
