<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>&#x2600;</text></svg>">
<title>Solstice — CSE Workload</title>

<link rel="stylesheet" href="/static/solstice.css">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
<nav id="s-nav" class="s-nav"></nav>
<div id="main" class="s-main"></div>
<script src="/static/solstice.js?v=2"></script>
<script>
S.initNav('cse');
S.restoreCard();
var theatre=new URLSearchParams(location.search).get('theatre')||'';
function load(){
  fetch('/api/cse-workload'+(theatre?'?theatre='+encodeURIComponent(theatre):'')).then(function(r){return r.json();}).then(render).catch(function(){});
}
function render(rows){
  var main=document.getElementById('main');
  if(!rows.length){main.innerHTML='<p class="text-muted" style="padding:2rem">No CSE data available.</p>';return;}
  var avg=rows.reduce(function(a,r){return a+r.account_count;},0)/rows.length;
  var pills=['','EMEA','JAPAC','AMER','LATAM'].map(function(t){
    var isActive=(theatre||'')===(t||'');
    return '<a href="/cse'+(t?'?theatre='+t:'')+'" class="pill'+(isActive?' active':'')+'">'+(t||'All')+'</a>';
  }).join('');
  var rows_html=rows.map(function(r){
    var pct=Math.min(Math.round((r.account_count/Math.max(avg*2,1))*100),100);
    var hi=r.blocked_count>5;
    return '<tr style="'+(hi?'background:var(--red-light)':'')+'">'
      +'<td style="padding:10px 12px;font-weight:600;color:var(--text)">'+S.esc(r.cse)+'</td>'
      +'<td style="text-align:right;padding:10px 12px;font-family:var(--mono)">'+r.account_count+'</td>'
      +'<td style="text-align:right;padding:10px 12px;font-family:var(--mono);color:'+(r.blocked_count>0?'var(--red)':'var(--muted)')+';font-weight:'+(r.blocked_count>5?700:400)+'">'+r.blocked_count+'</td>'
      +'<td style="text-align:right;padding:10px 12px;font-family:var(--mono);color:'+(r.at_risk_count>0?'var(--amber)':'var(--muted)')+'">'+r.at_risk_count+'</td>'
      +'<td style="text-align:right;padding:10px 12px;font-family:var(--mono);color:var(--green)">'+r.m9_this_month+'</td>'
      +'<td style="padding:10px 12px;min-width:120px"><div style="background:var(--surface-2);height:6px;border-radius:3px"><div style="background:'+(hi?'var(--red)':'var(--sky)')+';width:'+pct+'%;height:100%;border-radius:3px"></div></div></td>'
      +'</tr>';
  }).join('');
  main.innerHTML='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem">'
    +'<div style="font-size:9px;color:var(--muted);font-family:var(--mono)">'+rows.length+' CSEs · avg '+Math.round(avg)+' accounts</div>'
    +'<div style="display:flex;gap:.5rem">'+pills+'</div></div>'
    +'<div class="bsec">'
    +'<div class="shdr" onclick="S.toggleSec(this)">'
    +'<div class="shdr-icon" style="background:rgba(14,165,233,.12);color:var(--sky)">'+rows.length+'</div>'
    +'<span class="shdr-title">CSE Workload</span>'
    +'<span class="shdr-desc">— accounts, blocked, at-risk, M9 completions</span>'
    +'<div class="shdr-cnt"><span class="chev">&#9660;</span></div>'
    +'</div>'
    +'<div class="sbody">'
    +'<table class="s-table">'
    +'<thead><tr>'
    +'<th>CSE</th>'
    +'<th style="text-align:right">Accounts</th>'
    +'<th style="text-align:right">Blocked</th>'
    +'<th style="text-align:right">At Risk</th>'
    +'<th style="text-align:right">M9 This Month</th>'
    +'<th>Load</th>'
    +'</tr></thead>'
    +'<tbody>'+rows_html+'</tbody></table>'
    +'</div></div>';
}
load();
</script>
</body></html>
