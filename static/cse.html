<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>&#x2600;</text></svg>">
<title>Solstice - CSE Workload</title>
<link rel="stylesheet" href="/static/solstice.css">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
.wtbl{width:100%;border-collapse:collapse}
.wtbl th{padding:.45rem .75rem;font-size:8px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);font-family:var(--mono);font-weight:700;background:var(--surface);border-bottom:2px solid var(--border);text-align:left;white-space:nowrap}
.wtbl th.r{text-align:right}
.wtbl td{padding:.6rem .75rem;font-size:.88rem;border-bottom:1px solid var(--border-soft);color:var(--text);vertical-align:middle}
.wtbl td.r{text-align:right;font-family:var(--mono)}
.wtbl tr:hover td{background:var(--surface-2)}
.n8{font-size:1.1rem;font-weight:800;color:var(--sky)}
.bar-w{display:flex;align-items:center;gap:.5rem}
.bar-bg{height:7px;background:var(--border);border-radius:4px;flex:1;min-width:50px;overflow:hidden}
.bar-f{height:100%;background:var(--sky);border-radius:4px}
.bar-t{font-size:.75rem;font-family:var(--mono);color:var(--muted);min-width:2rem;text-align:right}
</style>
</head>
<body>
<nav id="s-nav" class="s-nav"></nav>
<div class="s-main">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem">
    <div style="font-size:.75rem;color:var(--muted);font-family:var(--mono)" id="meta"></div>
    <div style="display:flex;gap:.5rem" id="pills"></div>
  </div>
  <table class="wtbl">
    <thead><tr>
      <th>CSE</th>
      <th class="r">Accounts</th>
      <th class="r">Blocked</th>
      <th class="r">At Risk</th>
      <th class="r">M8 In Flight</th>
      <th>M8 Load</th>
    </tr></thead>
    <tbody id="tbody"></tbody>
  </table>
</div>
<script src="/static/solstice.js?v=5"></script>
<script>
S.initNav('cse');
S.restoreCard();
var theatre = new URLSearchParams(location.search).get('theatre') || '';

var pillsEl = document.getElementById('pills');
['','EMEA','JAPAC','AMER','LATAM'].forEach(function(t) {
  var a = document.createElement('a');
  a.href = '/cse' + (t ? '?theatre=' + t : '');
  a.className = 'pill' + ((theatre || '') === t ? ' active' : '');
  a.textContent = t || 'All';
  pillsEl.appendChild(a);
});

fetch('/api/cse-workload' + (theatre ? '?theatre=' + encodeURIComponent(theatre) : ''))
  .then(function(r) { return r.json(); })
  .then(function(data) {
    // Show all CSEs with any accounts, sorted by total account count desc
    var rows = data.filter(function(r) { return r.account_count > 0; });
    rows.sort(function(a, b) { return b.account_count - a.account_count; });
    var totalM8 = rows.reduce(function(a, r) { return a + r.m8_count; }, 0);
    var maxM8 = rows.reduce(function(a, r) { return Math.max(a, r.m8_count); }, 1);

    document.getElementById('meta').textContent = rows.length + ' CSEs · ' + totalM8 + ' M8 in flight';

    var tbody = document.getElementById('tbody');
    rows.forEach(function(r) {
      var pct = Math.round(r.m8_count / maxM8 * 100);
      var tr = document.createElement('tr');

      // CSE name
      var td1 = document.createElement('td');
      var strong = document.createElement('strong');
      strong.textContent = r.cse;
      td1.appendChild(strong);
      tr.appendChild(td1);

      // Total accounts
      var tdAcc = document.createElement('td');
      tdAcc.className = 'r';
      tdAcc.textContent = r.account_count;
      tr.appendChild(tdAcc);

      // Blocked
      var tdBlocked = document.createElement('td');
      tdBlocked.className = 'r';
      if (r.blocked_count > 0) {
        var sp = document.createElement('span');
        sp.className = 'badge badge-red';
        sp.style.cssText = 'font-size:8px;padding:2px 6px';
        sp.textContent = r.blocked_count;
        tdBlocked.appendChild(sp);
      } else {
        tdBlocked.textContent = '—';
        tdBlocked.style.color = 'var(--muted)';
      }
      tr.appendChild(tdBlocked);

      // At risk
      var tdRisk = document.createElement('td');
      tdRisk.className = 'r';
      if (r.at_risk_count > 0) {
        var sp2 = document.createElement('span');
        sp2.className = 'badge badge-amber';
        sp2.style.cssText = 'font-size:8px;padding:2px 6px';
        sp2.textContent = r.at_risk_count;
        tdRisk.appendChild(sp2);
      } else {
        tdRisk.textContent = '—';
        tdRisk.style.color = 'var(--muted)';
      }
      tr.appendChild(tdRisk);

      // M8 in flight
      var td2 = document.createElement('td');
      td2.className = 'r';
      var span = document.createElement('span');
      span.className = 'n8';
      span.style.fontSize = r.m8_count > 0 ? '1.1rem' : '.88rem';
      span.style.color = r.m8_count > 0 ? 'var(--sky)' : 'var(--muted)';
      span.textContent = r.m8_count || '—';
      td2.appendChild(span);
      tr.appendChild(td2);

      // Load bar
      var td3 = document.createElement('td');
      var barW = document.createElement('div');
      barW.className = 'bar-w';
      var barBg = document.createElement('div');
      barBg.className = 'bar-bg';
      var barF = document.createElement('div');
      barF.className = 'bar-f';
      barF.style.width = pct + '%';
      barBg.appendChild(barF);
      var barT = document.createElement('span');
      barT.className = 'bar-t';
      barT.textContent = r.m8_count || '';
      barW.appendChild(barBg);
      barW.appendChild(barT);
      td3.appendChild(barW);
      tr.appendChild(td3);

      tbody.appendChild(tr);
    });
  }).catch(function() {});
</script>
</body></html>
