<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>&#x2600;</text></svg>">
<title>Solstice — Velocity &amp; Forecast</title>

<link rel="stylesheet" href="/static/solstice.css">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
.conf{display:inline-flex;align-items:center;font-size:8px;font-weight:700;padding:2px 6px;border-radius:3px}
.conf-high{background:rgba(16,185,129,.12);color:var(--green)}
.conf-med{background:rgba(245,158,11,.12);color:var(--amber)}
.conf-low{background:rgba(239,68,68,.12);color:var(--red)}
.dcdot{display:inline-block;width:7px;height:7px;border-radius:50%;vertical-align:middle;margin-right:3px}
.ft-hdr{display:grid;grid-template-columns:18px 2fr .9fr .8fr .7fr .8fr;background:var(--surface-2);border-bottom:1px solid var(--border)}
.ft-hdr span{padding:.3rem .5rem;font-size:7.5px;text-transform:uppercase;letter-spacing:.09em;color:var(--muted);font-weight:700;font-family:var(--mono);border-right:1px solid var(--border-soft)}
.ft-hdr span:last-child{border-right:none}
.ftrow{display:grid;grid-template-columns:18px 2fr .9fr .8fr .7fr .8fr;border-bottom:1px solid var(--border-soft);align-items:center}
.ftrow:last-child{border-bottom:none}
.ftrow:hover{background:var(--surface-2)}
.fc{padding:.45rem .5rem;font-size:9.5px}
.overdue-banner{padding:.4rem 1rem;background:var(--red-light);border-top:1px solid #fca5a5;font-size:9px;color:#dc2626;font-family:var(--mono)}
.vel-grid{display:grid;grid-template-columns:repeat(6,1fr)}
.vel-w{padding:.85rem .75rem;text-align:center;border-right:1px solid var(--border);position:relative}
.vel-w:last-child{border-right:none}
.vel-w.cur{background:var(--green-light)}
.wlbl{font-size:8px;font-family:var(--mono);color:var(--muted);margin-bottom:.35rem}
.wnum{font-size:28px;font-weight:700;line-height:1;margin-bottom:3px;font-family:var(--mono)}
.wsub{font-size:8px;color:var(--muted)}
.varr{font-size:13px;position:absolute;top:8px;right:10px}
.trend-footer{padding:.45rem 1rem;font-size:9px;font-weight:700;border-top:1px solid var(--border);text-align:center;font-family:var(--mono);letter-spacing:.04em}
.th-grid{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--border)}
.th-tile{background:var(--surface);padding:.65rem 1rem}
.th-name{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;margin-bottom:.4rem;font-family:var(--mono)}
.th-big{font-size:22px;font-weight:700;line-height:1;font-family:var(--mono)}
.th-sub{font-size:8px;color:var(--muted);margin-top:2px}
.sla-row{display:grid;grid-template-columns:2fr 1fr 1fr;border-bottom:1px solid var(--border-soft);align-items:center;padding:.45rem .75rem}
.sla-row:last-child{border-bottom:none}
.sla-row:hover{background:var(--surface-2)}
.empty{padding:1.75rem;text-align:center;color:var(--muted);font-size:10px}
</style>
</head>
<body>
<nav id="s-nav" class="s-nav"></nav>

<!-- Sub-header: theatre filter pills -->
<div style="background:var(--surface);border-bottom:1px solid var(--border);padding:.45rem 1.5rem;display:flex;align-items:center;gap:.4rem;flex-wrap:wrap;position:sticky;top:44px;z-index:90">
  <span style="font-size:9px;color:var(--muted);font-family:var(--mono);margin-right:.25rem">THEATRE</span>
  <button class="pill act" data-t="" onclick="setT(this,'')">All</button>
  <button class="pill" data-t="EMEA" onclick="setT(this,'EMEA')">EMEA</button>
  <button class="pill" data-t="AMER" onclick="setT(this,'AMER')">AMER</button>
  <button class="pill" data-t="JAPAC" onclick="setT(this,'JAPAC')">JAPAC</button>
  <button class="pill" data-t="LATAM" onclick="setT(this,'LATAM')">LATAM</button>
  <span style="width:1px;height:16px;background:var(--border);margin:0 .25rem"></span>
  <button id="churn-toggle" class="pill" onclick="toggleChurn(this)" title="147 churned accounts have M9 dates but will never upgrade">Hide Churned</button>
  <span id="date-range" style="margin-left:auto;font-size:9px;color:var(--muted);font-family:var(--mono)">—</span>
</div>

<div id="main" class="s-main" style="max-width:1180px;display:grid;grid-template-columns:1fr 320px;gap:1.25rem;align-items:start">
<!-- LEFT COLUMN -->
<div style="display:flex;flex-direction:column;gap:1.1rem">

  <!-- 12-week velocity — top of page -->
  <div class="card">
    <div class="card-head">
      <span class="card-title">12-Week M9 Velocity</span>
      <span style="font-size:9px;color:var(--muted);font-family:var(--mono)" id="vel-sub">Last 12 weeks</span>
    </div>
    <div class="vel-grid" id="vel-grid"></div>
    <div class="trend-footer" id="trend-footer">—</div>
  </div>

  <!-- Next 3 months M9 targets -->
  <div class="card">
    <div class="card-head">
      <span class="card-title">Next 3 Months — M9 Targets</span>
      <span id="forecast-counter" style="font-size:11px;font-weight:700;font-family:var(--mono);color:var(--sky);background:rgba(14,165,233,.10);padding:2px 8px;border-radius:4px">—</span>
      <span style="font-size:9px;color:var(--muted);font-family:var(--mono)" id="theatre-label">All Theatres</span>
    </div>
    <div class="ft-hdr">
      <span></span><span>Account</span><span>M9 Date</span><span>Theatre</span><span>DC</span><span>Confidence</span>
    </div>
    <div id="forecast-body"><div class="empty">Loading…</div></div>
  </div>


</div>
<!-- RIGHT COLUMN -->
<div style="display:flex;flex-direction:column;gap:1.1rem">

  <!-- Next week by theatre -->
  <div class="card">
    <div class="card-head">
      <span class="card-title">3 Months by Theatre</span>
      <span style="font-size:9px;color:var(--muted)">M8 + M9 targets</span>
    </div>
    <div class="th-grid" id="th-tiles"></div>
  </div>

  <!-- Confidence legend -->
  <div class="card">
    <div class="card-head"><span class="card-title">Confidence Logic</span></div>
    <div class="card-body" style="font-size:9px;color:var(--muted);line-height:2">
      <div><span class="conf conf-high" style="margin-right:.4rem">HIGH</span>M8 active + DC Green</div>
      <div><span class="conf conf-med" style="margin-right:.4rem">MED</span>M8 active, DC not Green</div>
      <div><span class="conf conf-low" style="margin-right:.4rem">LOW</span>M8 not yet started</div>
    </div>
  </div>

</div>
</div><!-- /main -->

<script src="/static/solstice.js?v=2"></script>
<script>
S.initNav('forecast'); S.restoreCard();
document.addEventListener('DOMContentLoaded',function(){
  var btn=document.getElementById('churn-toggle');
  if(btn){btn.classList.add('act');}
});

var E=S.esc;
var _t='',_raw={},_hideChurn=true;
var DC_C={'Green':'#10b981','Yellow':'#f59e0b','Red':'#ef4444'};
var TH_COLS={'EMEA':'#0ea5e9','AMER':'#3b82f6','JAPAC':'#a78bfa','LATAM':'#f59e0b'};

function toggleChurn(btn){
  _hideChurn=!_hideChurn;
  btn.classList.toggle('act',_hideChurn);
  btn.textContent=_hideChurn?'Hide Churned':'Show Churned';
  if(_raw&&Object.keys(_raw).length) renderForecast(_raw);
}
var MONTHS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

function setT(el,t){
  _t=t;
  document.querySelectorAll('.pill').forEach(function(p){p.classList.remove('act');});
  el.classList.add('act');
  document.getElementById('theatre-label').textContent=t||'All Theatres';
  load();
}

function fmtDate(s){
  if(!s)return '—';
  var p=s.split('-');
  if(p.length===3)return p[2]+' '+(MONTHS[parseInt(p[1],10)-1]||p[1]);
  return s;
}

function load(){
  fetch('/api/forecast?theatre='+encodeURIComponent(_t))
    .then(function(r){return r.json();})
    .then(function(d){
      _raw=d;
      renderForecast(d);
      renderVelocity(d);
      renderTheatreTiles(d);
    })
    .catch(function(){document.getElementById('forecast-body').innerHTML='<div class="empty">Error loading forecast</div>';});
}

function renderForecast(d){
  function _isChurn(a){ return (a.subtype||'')==='churn' || (a.signal||'')==='churn'; }
  var targets=(d.next_targets||[])
    .filter(function(a){ return !_hideChurn || !_isChurn(a); })
    .slice().sort(function(a,b){return (a.m9_date||'').localeCompare(b.m9_date||'');});
  var overdue=(d.overdue||[]);
  var counter = document.getElementById('forecast-counter');
  var allTargets = (d.next_targets||[]).slice().sort(function(a,b){return (a.m9_date||'').localeCompare(b.m9_date||'');});
  var churnCount = allTargets.filter(_isChurn).length;
  if(counter) counter.textContent = targets.length + ' active' + (churnCount ? '  ·  '+churnCount+' churned' : '');
  var html='';
  if(!targets.length&&!overdue.length){
    html='<div class="empty">No M9 targets in next 3 months</div>';
  } else {
    targets.forEach(function(a){
      var dc=a.dc_progress||'—';
      var dcc=DC_C[dc]||'var(--muted)';
      var conf=a.confidence||'LOW';
      var cclass={'HIGH':'conf-high','MED':'conf-med','LOW':'conf-low'}[conf]||'conf-low';
      var th=a.account_theatre||'';
      var thcol=TH_COLS[th]||'var(--muted)';
      var lbl=a.m8_started?'M9':'M8';
      var lcol=a.m8_started?'var(--green)':'var(--sky)';
      var aid=a.account_id?'S.openAccountCard(\''+a.account_id+'\')':'';
      html+='<div class="ftrow"'+(aid?' onclick="'+aid+'" style="cursor:pointer"':'')+' >'
        +'<div class="fc" style="color:'+lcol+';font-size:9px;text-align:center;font-weight:700;font-family:var(--mono)">'+lbl+'</div>'
        +'<div class="fc"><div style="font-weight:700;font-size:10px">'+E(a.customer_name)+'</div>'
          +'<div style="font-size:8px;color:var(--muted)">'+E(a.active_cse||'—')+'</div></div>'
        +'<div class="fc" style="font-family:var(--mono);font-size:8.5px;color:var(--muted)">'+fmtDate(a.m9_date)+'</div>'
        +'<div class="fc"><span style="font-size:7.5px;font-weight:700;padding:1px 5px;border-radius:2px;background:'+thcol+'18;color:'+thcol+';font-family:var(--mono)">'+E(th)+'</span></div>'
        +'<div class="fc"><span class="dcdot" style="background:'+dcc+'"></span><span style="font-size:8.5px;color:'+dcc+'">'+E(dc)+'</span></div>'
        +'<div class="fc"><span class="conf '+cclass+'">'+conf+'</span></div>'
        +'</div>';
    });
    if(overdue.length){
      html+='<div class="overdue-banner">&#9888; '+overdue.length+' overdue: '
        +overdue.slice(0,3).map(function(a){return E(a.customer_name);}).join(', ')
        +(overdue.length>3?' + '+(overdue.length-3)+' more':'')+'</div>';
    }
  }
  document.getElementById('forecast-body').innerHTML=html;
  var now=new Date();
  var end=new Date(now); end.setDate(end.getDate()+90);
  document.getElementById('date-range').textContent=
    now.getDate()+' '+MONTHS[now.getMonth()]+' – '+end.getDate()+' '+MONTHS[end.getMonth()];
}

function renderVelocity(d){
  var vel=d.velocity||[];
  var html='';
  vel.forEach(function(v,i){
    var isCur=(i===vel.length-1);
    var prev=i>0?vel[i-1].m9_count:null;
    var arr=prev===null?'':v.m9_count>prev?'&#8593;':v.m9_count<prev?'&#8595;':'';
    var arrc=arr==='&#8593;'?'var(--green)':arr==='&#8595;'?'var(--red)':'var(--muted)';
    var m8c = v.m8_count !== undefined ? v.m8_count : '—';
    html+='<div class="vel-w'+(isCur?' cur':'')+'">'
      +'<div class="wlbl">'+E(v.label)+'</div>'
      +'<div class="wnum" style="color:'+(isCur?'var(--green)':'var(--muted)')+'">'+v.m9_count+'</div>'
      +'<div class="wsub">M9 done</div>'
      +'<div style="font-size:10px;color:var(--sky);font-family:monospace;margin-top:3px">'+m8c+' M8</div>'
      +(arr?'<span class="varr" style="color:'+arrc+'">'+arr+'</span>':'')
      +'</div>';
  });
  document.getElementById('vel-grid').innerHTML=html||'<div class="empty">No velocity data</div>';
  var trend=d.trend||'flat';
  var ts={'up':'color:var(--green)','down':'color:var(--red)','flat':'color:var(--muted)'}[trend];
  var tl={'up':'&#9650; Trending UP','down':'&#9660; Trending DOWN','flat':'&#8594; Flat velocity'}[trend];
  var tf=document.getElementById('trend-footer');
  tf.setAttribute('style',ts); tf.innerHTML=tl+' over 12 weeks';
}

function renderTheatreTiles(d){
  var targets=d.next_targets||[];
  var m9T={'EMEA':0,'AMER':0,'JAPAC':0,'LATAM':0};
  var m8T={'EMEA':0,'AMER':0,'JAPAC':0,'LATAM':0};
  targets.forEach(function(a){
    var t=a.account_theatre||'EMEA';
    if(m9T[t]!==undefined){
      if(a.m8_started) m9T[t]++;
      else m8T[t]++;
    }
  });
  document.getElementById('th-tiles').innerHTML=
    ['EMEA','AMER','JAPAC','LATAM'].map(function(t){
      var c=TH_COLS[t];
      return '<div class="th-tile">'
        +'<div class="th-name" style="color:'+c+'">'+t+'</div>'
        +'<div class="th-big" style="color:'+c+'">'+m9T[t]+'</div>'
        +'<div style="font-size:9px;color:var(--muted);margin-top:2px">M9 in pipeline</div>'
        +'<div style="font-size:11px;font-weight:700;font-family:var(--mono);margin-top:4px;color:var(--sky)">'+m8T[t]+'</div>'
        +'<div style="font-size:8px;color:var(--muted)">M8 not started</div>'
        +'</div>';
    }).join('');
}

function loadSLA(){
  fetch('/api/sla-breaches?theatre='+encodeURIComponent(_t))
    .then(function(r){return r.json();})
    .then(function(rows){
      if(!rows||!rows.length){
        document.getElementById('sla-body').innerHTML='<div class="empty">No active SLA windows</div>';
        return;
      }
      var html='<div style="display:grid;grid-template-columns:2fr 1fr 1fr;border-bottom:1px solid var(--border);padding:.3rem .75rem;background:var(--surface-2)">'
        +'<span style="font-size:7.5px;font-weight:700;letter-spacing:.09em;color:var(--muted);font-family:var(--mono)">ACCOUNT</span>'
        +'<span style="font-size:7.5px;font-weight:700;letter-spacing:.09em;color:var(--muted);font-family:var(--mono)">SLA STATUS</span>'
        +'<span style="font-size:7.5px;font-weight:700;letter-spacing:.09em;color:var(--muted);font-family:var(--mono)">CSE</span>'
        +'</div>';
      rows.slice(0,15).forEach(function(r){
        var slaHtml=S.slaCountdownHTML(r.m3_complete?r.m3_planned:null, r.m8_planned, r.m8_started?r.m8_planned:null, r.m9_planned, r.m9_complete?r.m9_planned:null);
        html+='<div class="sla-row">'
          +'<div><div style="font-size:10px;font-weight:700">'+E(r.customer_name||'—')+'</div>'
            +'<div style="font-size:8px;color:var(--muted)">'+E(r.owner_e2e||r.active_cse||'—')+'</div></div>'
          +'<div>'+slaHtml+'</div>'
          +'<div style="font-size:9px;color:var(--muted)">'+E(r.active_cse||'—')+'</div>'
          +'</div>';
      });
      if(rows.length>15)html+='<div style="padding:.5rem 1rem;font-size:9px;color:var(--muted);font-family:var(--mono)">+ '+(rows.length-15)+' more breaches</div>';
      document.getElementById('sla-body').innerHTML=html;
    })
    .catch(function(){document.getElementById('sla-body').innerHTML='<div class="empty">Error loading SLA data</div>';});
}

load();
</script>
</body></html>
